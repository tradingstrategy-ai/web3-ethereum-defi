short_description: Gtsy is an individual Morpho vault curator associated with the Ethereum gtsy and gtsy (usdt) vaults.
long_description: |
  Morpho's official vault pages describe the Ethereum gtsy and gtsy (usdt) products as Morpho vaults and expose the same address as their curator in the rendered vault role metadata.
  CuratorWatch tracks Gtsy as an individual curator with two Ethereum Morpho vaults, about $1.0M AUM, and no website listed.
  The linked CuratorWatch profile lists the X handle gtsy__, while Morpho shows no submitted curator disclosure for the checked vault pages.
twitter: gtsy__

