website: https://lista.org/
short_description: Lista DAO is a permissionless liquid staking and CDP stablecoin lending protocol native to BNB Chain.
long_description: |
  Lista DAO is an open-source liquidity protocol built on BNB Chain that enables users to earn yield on collateralised crypto assets including BNB, ETH, and stablecoins.
  The protocol issues lisUSD, a decentralised stablecoin backed by collateralised debt positions, and slisBNB, a liquid staking token for BNB.
  Lista DAO describes itself as a leading LSDfi and CDP stablecoin protocol, positioning liquid staking and stablecoin borrowing as accessible and permissionless for all DeFi participants.
  The protocol curates Euler EVK vaults on Ethereum mainnet and BNB Chain, offering yield strategies across assets such as USDC, USDT, USD1, BTC, and BNB.
