# Evidence and background references.
#
# Lista DAO curates Euler EVK vaults on Ethereum (chain 1) and BNB Chain (chain 56).
# Vault names include "Lista DAO BNB Vault", "Lista DAO USD1 Vault", "Lista BTC Vault",
# "Lista USDC Vault", "Lista USDT Vault", "Lista USDC Savings Vault",
# "Lista USDT Savings Vault", "Lista U Vault", "Lista Credit Vault", and "Lista XAUT Vault".
# The "Lista DAO" prefix in vault names and the self-branded "Lista *" naming scheme
# are both used, distinguishing these from third-party vaults that use Lista tokens
# as collateral (e.g. "Karak-Lista USD", "A41 Lista USD", "Staked Lista BNB").
