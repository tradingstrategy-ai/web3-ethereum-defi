short_description: Fidelity International is a privately owned investment manager providing investment solutions and retirement expertise worldwide.
long_description: |
  Fidelity International provides investment management, asset administration and retirement services to institutional and individual clients. It is independent of the US-based Fidelity Investments organisation.

  For this integration, Fidelity International is the investment manager behind the Fidelity USD Digital Liquidity Fund (FILQ). Sygnum supplies the tokenisation, settlement and distribution infrastructure rather than managing the fund's portfolio.
