short_description: CNCB (Hong Kong) Capital Limited is a Hong Kong SFC-regulated asset manager and securities firm in the CITIC group.
long_description: |
  CNCB (Hong Kong) Capital Limited provides asset management and other financial services as a subsidiary of CNCB (Hong Kong) Investment Limited. It is licensed for Type 9 asset management in Hong Kong, and the Hong Kong Exchanges and Clearing fund portal identifies it as manager of the CNCB Capital US Dollar Money Market Fund.

