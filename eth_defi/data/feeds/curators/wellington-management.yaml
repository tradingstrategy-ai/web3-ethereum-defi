short_description: Wellington Management is an independent investment manager serving institutional and private-market clients worldwide.
long_description: |
  Wellington Management is a privately held global investment manager whose research-led capabilities span fixed income, equities, multi-asset strategies and alternatives. The firm traces its roots to 1928 and operates through investment teams supported by a shared research platform.

  For this integration, Wellington acts as sub-adviser to the Delta Wellington Ultra Short Treasury Onchain Fund (ULTRA) and manages its US Treasury portfolio. FundBridge established the fund under its Delta Master Trust structure, while Libeara supplies the tokenisation platform used for subscriptions, issuance, transfers and redemptions.
