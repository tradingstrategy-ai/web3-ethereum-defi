short_description: China Asset Management (Hong Kong) is a Hong Kong asset manager offering funds, ETFs, mandates and investment advisory services.
long_description: |
  China Asset Management (Hong Kong) Limited is a wholly owned subsidiary of China Asset Management Co. Limited and was incorporated in Hong Kong in 2008. Its investment platform covers equity and fixed-income funds, ETFs, mandates and advisory services for individual and institutional investors.

  The company manages the ChinaAMC USD Digital Money Market Fund, whose reviewed tokenised share deployments include CUMIU through Libeara and AMCASH+ through Asseto.

