short_description: Cassa is on-chain infrastructure for risk markets across vaults, lenders, stakers and stablecoin issuers.
long_description: |
  Cassa builds deterministic on-chain infrastructure for turning risk into liquid markets for vaults, lenders, stakers and stablecoin issuers.
  Its data room describes current partnerships, technical materials and the team behind the protocol.
  Turtle lists a Cassa campaign and identifies Cassa as an RWA risk and liquidity infrastructure layer connected to DeFi lending and stablecoin venues.

