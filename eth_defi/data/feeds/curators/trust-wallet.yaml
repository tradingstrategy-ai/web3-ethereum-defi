short_description: Trust Wallet is the world's leading self-custody multi-chain wallet, trusted by over 200 million users, that sponsors branded ERC-4626 earn vaults built on Kiln OmniVault infrastructure.
long_description: |
  Trust Wallet is a self-custody cryptocurrency wallet supporting more than 10 million digital assets
  across 100+ blockchains, acquired by Binance in 2018 and used by over 200 million people worldwide.
  The wallet provides mobile and browser-extension interfaces for managing crypto, NFTs, staking, and
  DeFi access.
  In its Earn product, Trust Wallet acts as the sponsor and distributor of a family of branded ERC-4626
  vaults built on Kiln OmniVault infrastructure; the underlying yield strategies are provided by established
  DeFi protocols such as Aave v3 and Morpho (Gauntlet, Smokehouse curators), while Trust Wallet
  distributes these vaults to its user base across Ethereum, Base, Arbitrum, and BNB Chain.
