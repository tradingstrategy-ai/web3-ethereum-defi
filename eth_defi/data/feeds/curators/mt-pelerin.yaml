short_description: Mt Pelerin is a regulated Swiss fintech offering self-custodial crypto-fiat exchange, asset tokenisation, and DeFi vault curation since 2018.
long_description: |
  Mt Pelerin Group Ltd is a regulated Swiss crypto brokerage and fintech company founded in 2018, offering
  self-custodial cryptocurrency exchange, fiat on/off-ramps, OTC brokerage, and Lombard loan services via its
  Bridge Wallet application. The company has expanded into decentralised finance by curating ERC-4626 yield
  vaults on Lagoon Finance and Morpho, focusing on USD, ETH, and BTC strategy pools with an emphasis on
  security, transparency, and risk management. Mt Pelerin holds a regulated crypto brokerage licence in
  Switzerland and has processed over USD 1 billion in transactions for more than 150,000 users worldwide.
