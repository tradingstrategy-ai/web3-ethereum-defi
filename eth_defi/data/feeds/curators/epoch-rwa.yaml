short_description: Epoch RWA is a Hong Kong-based platform for structuring, managing and issuing tokenised real-world assets.
long_description: |
  Epoch RWA is operated by Epoch Datatech (HK) Limited and provides infrastructure for screening, structuring, managing and issuing real-world assets. The firm launched Epoch Stable Credit Notes with Asseto, using cross-border e-commerce receivables as the underlying credit assets.

  Epoch RWA is treated as the curator of EPOCH+ because its official launch materials describe Epoch as performing risk screening and asset management, while Asseto supplies the tokenisation and onchain circulation platform.
