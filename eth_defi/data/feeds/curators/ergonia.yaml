long_description: |
  Ergonia describes itself as a DeFi-centric proprietary onchain trading arm and venture builder. Its trading business focuses on liquidity provision and market-trading infrastructure, while Ergonia Labs supports blockchain projects with capital, research, infrastructure and operational input.
  Upshift lists Ergonia as a strategist for the Kintsu superMON Vault on Monad. The mapping retains this protocol-native strategist attribution alongside the vault's other named strategist.
