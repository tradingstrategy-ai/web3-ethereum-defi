short_description: 'BTCD Labs operates Bitcoin Dollar, a DeFi protocol built around BTCD, sBTCD and FISC.'
long_description: |
  BTCD Labs Ltd. presents Bitcoin Dollar as a service for BTCD minting, redemption and staking, with FISC governance. The Bitcoin Dollar documentation describes BTCD as a collateralised token pegged to a continuous 50/50 BTC/USD portfolio, with sBTCD as the yield-bearing staked version and FISC as the governance token. The project's blog covers the USD Vault, sBTCD collateral and integrations with IPOR Fusion, Morpho and Aave.
