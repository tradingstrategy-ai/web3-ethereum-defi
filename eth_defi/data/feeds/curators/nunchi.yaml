short_description: Nunchi builds benchmark infrastructure and perpetual markets for onchain rate and yield exposure.
long_description: |
  Nunchi describes itself as benchmark infrastructure for rate markets, publishing rates-tracking indices and building tradable reference-rate products for desks, market makers, treasuries and systematic traders. Its documentation describes Nunchi as a HIP-3 perpetuals exchange for yield, while Nunchi's audit repository covers vault deployments associated with nLP. CuratorWatch tracks Nunchi as the curator of one HyperEVM HYPE vault under protocol unknown, with about $310k AUM.
