long_description: |
  Monarq Asset Management is a quantitative, multi-strategy digital-asset investment firm that uses systematic research, data and trading infrastructure to seek risk-adjusted returns. The firm was formerly known as MNNC Group, which is retained as an Upshift strategist alias for historical vault metadata.
  Upshift lists Monarq as the strategist for the Monarq XRP Yield Vault on Flare, and its official launch materials identify Monarq Asset Management as the curator of that vault.
