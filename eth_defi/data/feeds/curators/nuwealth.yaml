short_description: NuWealth is an onchain wealth app that provides curated DeFi yield vaults powered by Morpho.
long_description: |
  NuWealth describes itself as an onchain wealth partner for earning, saving and growing assets through curated DeFi yield vaults powered by Morpho. Bake's official lending announcement describes NuWealth as an independent third-party risk manager that helps optimise vault allocations and monitor risk parameters for conservative onchain lending strategies. CuratorWatch tracks NuWealth as the curator of three Ethereum Morpho vaults, with about $173k AUM across NuWealth Anchor USDC, NuWealth Anchor EURC and NuWealth Anchor USDT.
