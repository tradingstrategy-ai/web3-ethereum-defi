short_description: Flowmark curates institutional-grade real-world asset vaults for on-chain credit markets.
long_description: |
  Flowmark describes itself as an RWA vault curator that bridges institutional capital to real-world yield through underwriting, quantitative risk management, and on-chain transparency. Its Morpho forum announcement says Flowmark designs, parameterises, and structures allocations to alternative lending markets so on-chain investors can access RWA-backed yield through auditable on-chain programmes.

