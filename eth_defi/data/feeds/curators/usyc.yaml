long_description: |
  Circle International Bermuda Limited administers USYC on behalf of the Hashnote International Short Duration Yield Fund Ltd. USYC represents fund shares invested in short-term U.S. government securities and reverse repurchase agreements.

  Circle operates the USYC token, oracle and entitlement-gated subscription and redemption infrastructure. The product is available only to eligible non-U.S. persons and does not have a separate third-party strategy curator.
