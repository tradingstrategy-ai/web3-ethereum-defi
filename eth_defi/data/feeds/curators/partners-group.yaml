short_description: Partners Group is a global private-markets investment firm active across private equity, infrastructure, real estate, private credit and royalties.
long_description: |
  Partners Group is a global private-markets investment firm that invests and manages assets across private equity, infrastructure, real estate, private credit and royalties. Its integrated investment platform provides portfolio management and investment solutions for institutional and private-wealth clients.

  Partners Group manages the private-infrastructure strategy underlying Asseto's NGI+ tokens. Asseto provides the tokenisation and token administration infrastructure rather than investment management.
