short_description: M11 Credit provides institutional credit underwriting and fixed-income opportunities in digital assets.
long_description: |
  M11 Credit offers fixed-income opportunities to capital allocators and credit solutions to established crypto-native companies and DeFi protocols. Its official materials describe expertise in off-chain and on-chain deal structuring, underwriting, collateralisation, covenants, and capital introduction. FalconX and M11 Credit identify M11 Credit as the curator, administrator, servicer, and collateral agent for the FalconX Credit Vault on Pareto.
