# J.P. Morgan curator
#
# Rationale:
# - JLTXX is JPMorgan's OnChain Liquidity-Token Money Market Fund and is issued
#   through the Kinexys Digital Assets Fungible Asset Contract surface.
# - Kinexys provides the tokenisation and settlement technology. The curator
#   business for this entry is J.P. Morgan, not Kinexys.
# - Exact vault-address detection in eth_defi.vault.curator maps the production
#   JLTXX and MONY contracts to this curator slug.
feeder-id: jpmorgan
name: J.P. Morgan
role: curator
website: https://www.jpmorgan.com
twitter: jpmorgan
linkedin: jpmorgan
# rss: not found - J.P. Morgan newsroom pages do not expose RSS/Atom links
short_description: J.P. Morgan is a global investment bank and financial services firm serving corporate, institutional, government and investor clients.
long_description: |
  J.P. Morgan is a global investment bank and financial services firm within JPMorgan Chase & Co. The bank provides investment banking, markets, securities services, treasury services, payments, asset management, private banking and wealth-management services for companies, institutions, governments and investors around the world.

  For this integration, J.P. Morgan is treated as the curator of the JLTXX and MONY vault-like instruments because both are J.P. Morgan fund products. Kinexys is the technology provider for the tokenised asset and settlement infrastructure; it is not the curator business represented by this YAML entry. J.P. Morgan's MONY launch announcement identifies the fund as powered by Kinexys Digital Assets and distributed through Morgan Money.

