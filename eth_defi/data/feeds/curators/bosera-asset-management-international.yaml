short_description: Bosera Asset Management (International) is a Hong Kong asset manager providing fixed-income, equity and index investment products.
long_description: |
  Bosera Asset Management (International) Co., Limited is the Hong Kong subsidiary of Bosera Asset Management Co., Limited and China Merchants Fund Management Co., Ltd. Its official profile describes a product range focused primarily on fixed-income investments alongside active equity and passive index strategies, serving investors across major international financial markets.

  Bosera Asset Management (International) manages the BELIF tokenised share of the Bosera Liquidity Income Fund SP, while Libeara provides the tokenisation platform.

