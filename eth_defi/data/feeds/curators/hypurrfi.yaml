short_description: HypurrFi is a DeFi lending and yield protocol on HyperEVM offering lending markets and curated earn vaults across major tokens and stablecoins.
long_description: |
  HypurrFi is a DeFi protocol built on Hyperliquid's HyperEVM chain that provides lending, borrowing, and yield-earning services.
  Its app describes optimised lending markets and curated earn vaults for assets including USDC, USDT0, USDH, HYPE, and USDG0, targeting users who want to earn yield on their crypto holdings.
  HypurrFi also offers USDXL, a Hyperliquid-native stablecoin, and integrated swap and bridge functionality.
  The homepage tagline is "Trade, earn, spend, grow", combining lending markets with a crypto credit card product.
