short_description: Apollo is a global alternative asset manager and capital provider offering credit, private equity and retirement solutions.
long_description: |
  Apollo is a global alternative asset manager and capital provider. Its investment platform spans credit, private equity and real assets, alongside retirement-services businesses.

  For this integration, Apollo is the curator of the Apollo Diversified Credit Securitize Fund (ACRED). ACRED is a Securitize-managed feeder fund that provides qualifying investors with exposure to Apollo Diversified Credit Fund.
