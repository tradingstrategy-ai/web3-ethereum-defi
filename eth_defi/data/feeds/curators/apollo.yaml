short_description: Apollo is a global alternative asset manager with private credit strategies.
long_description: |
  Apollo is a global alternative asset manager. The vault metrics JSON uses
  ``apollo`` as the curator identity for Ember Apollo ACRED, an Ember vault
  linked to Apollo credit exposure.

  This is intentionally distinct from ``apollo-crypto``, the separate
  Australian crypto-asset fund manager that curates Midas mAPOLLO products.
  The two identities have different official websites and logos.
