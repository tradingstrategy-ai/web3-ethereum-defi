long_description: |
  Blockchain Capital is a venture-capital firm focused on businesses building blockchain and cryptocurrency products. It invests in companies at different stages of development and manages investment funds for its investors.

  For this integration, Blockchain Capital is the curator of BCAP, the share class of its Blockchain Capital III Digital Liquid Venture Fund.
