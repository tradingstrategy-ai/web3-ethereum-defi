short_description: Fidelity is the shared curator identity for tokenised funds managed by Fidelity Investments and Fidelity International.
long_description: |
  Fidelity groups the tokenised-fund products managed by Fidelity Investments and Fidelity International under one curator identity in the vault export. The two investment managers are independent organisations, and each vault retains its specific manager attribution.

  Fidelity International manages the Fidelity USD Digital Liquidity Fund represented by FILQ, while Sygnum supplies its tokenisation, settlement and distribution infrastructure. Fidelity Investments manages the Fidelity Treasury Digital Fund represented by FDIT, while DTCC supplies its tokenisation and compliance infrastructure.
