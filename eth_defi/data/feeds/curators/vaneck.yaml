short_description: VanEck is an investment manager offering exchange-traded funds, mutual funds and private-market investment strategies.
long_description: |
  VanEck is an investment manager that provides investment products and strategies for institutional and individual investors. Its offerings include exchange-traded funds, mutual funds and private-market investment strategies.

  For this integration, VanEck is the curator of the VanEck Treasury Fund (VBILL). Securitize provides fund administration, transfer-agent and placement-agent services for the tokenised fund.
