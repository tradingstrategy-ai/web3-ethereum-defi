short_description: Franklin Templeton is the global investment manager and issuer of the Benji tokenised money-market fund shares covered by this integration.
long_description: |
  Franklin Templeton is a global investment manager offering investment strategies and services to
  individual and institutional investors. Through its Benji platform, Franklin Templeton provides
  blockchain-integrated recordkeeping and transfer-agent services for tokenised fund shares. The issuer's
  contract registry identifies Franklin's Ethereum BENJI and iBENJI tokens as fund-token deployments.
