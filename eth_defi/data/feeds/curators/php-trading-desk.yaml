long_description: |
  PHP Trading Desk runs a public pool on Lighter, a zero-knowledge rollup decentralised exchange on Ethereum.
  The pool focuses on intraday Bitcoin trading with strict risk management and consistent execution.
  Lighter public pool operators are protocol-whitelisted and must maintain a minimum ownership stake in their own pool, aligning their interests with depositors.
  The operator posts updates and accepts contact via X at @danipop99james.
