long_description: |
  Y10K Capital describes itself as the asset-management arm of Yield Network. It allocates capital across structured pre-deposits, genesis launches and curated lending markets, with curation and risk operations provided by RockawayX.
  Upshift lists Y10K Capital as the strategist for a Solana vault. The exact strategist mapping covers this public Upshift metadata even though the current vault is not EVM-based.
