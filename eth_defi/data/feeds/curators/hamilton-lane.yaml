long_description: |
  Hamilton Lane is a private-markets investment manager providing investment programmes and evergreen fund strategies across private equity, private credit and other private assets. Its offering includes programmes for institutions and private-market investors.

  For this integration, Hamilton Lane is the curator of HLSCOPE, which provides access to its Senior Credit Opportunities Fund.
