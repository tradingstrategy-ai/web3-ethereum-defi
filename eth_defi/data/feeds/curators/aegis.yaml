short_description: Aegis offers digital dollars designed to maintain a dollar value while generating yield.
long_description: |
  Aegis provides YUSD and jUSD, digital dollars designed to maintain a dollar value while generating yield. YUSD is backed by Bitcoin and uses hedging to reduce exposure to Bitcoin price movements, while jUSD uses JLP collateral. Aegis publishes information about its reserves and market positions on its website. Accountable lists Aegis as the manager of the Aegis Yield Vault.
