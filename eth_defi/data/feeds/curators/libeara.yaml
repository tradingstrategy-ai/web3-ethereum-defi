short_description: Libeara is a tokenisation platform for regulated capital-market products.
long_description: |
  Libeara develops blockchain infrastructure for tokenised real-world assets and capital-market products. Its platform supports issuance and lifecycle administration for regulated digital fund shares, including the reviewed CUMIU and BELIF CMTAT products.

  This record represents Libeara's platform and administration role. Vault exports attribute CUMIU, BELIF and ULTRA to their respective investment managers instead.
