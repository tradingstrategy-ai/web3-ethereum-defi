short_description: Farm Capital is a digital asset manager that actively manages liquidity across blockchain and DeFi platforms.
long_description: |
  Farm Capital describes itself as a digital asset manager managing liquidity across blockchain and DeFi platforms, specialising in yield farming opportunities, market-neutral arbitrage, quantitative trading and liquid venture investments. Its website presents mFARM as a flagship product formed through a partnership between Farm Capital and Midas, structured to track market-neutral yield strategies deployed in on-chain markets across multiple ecosystems. CuratorWatch tracks Farm Capital as the curator of the mFARM USDC vault on Polygon under protocol mfarm.
