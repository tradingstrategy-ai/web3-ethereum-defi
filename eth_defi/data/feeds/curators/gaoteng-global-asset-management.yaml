long_description: |
  GaoTeng Global Asset Management is a Hong Kong investment manager strategically invested in by Hillhouse Capital and Tencent. The firm offers active investment strategies and manages GaoTeng WeFund, whose sub-funds include the GaoTeng WeValue USD Money Market Fund underlying Asseto's GTCASH+ tokenised fund.
