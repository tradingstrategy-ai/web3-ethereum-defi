short_description: R2 is an on-chain asset management protocol for structured access to real-world yield through stablecoins and tokenised assets.
long_description: |
  R2 describes itself as an on-chain wealth management protocol that connects stablecoin capital with institutional-grade yield strategies through a transparent, vault-based architecture. Its website presents R2 Reserve for cash-like allocation and R2 Prime for longer-term structured strategies across real-world asset and credit exposures. CuratorWatch tracks R2 as the curator of one Ethereum Staked R2USD vault, with approximately $247K AUM, protocol marked unknown, and live deal data pulled through Turtle.
