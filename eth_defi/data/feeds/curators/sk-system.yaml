short_description: Korean Bitcoin futures trend-following operator running the "Show Me The BTC (Breakout)" vault on GRVT, known online as 지발돈좀 (Jibaldonjom).
long_description: |
  SK System operates the "Show Me The BTC (Breakout)" strategy vault on the GRVT exchange under the manager name Kim Seon-kyung, CEO of YH Holdings.
  The operator is known in Korean finance communities as 지발돈좀 (Jibaldonjom), running a YouTube channel with approximately 40,000 subscribers covering Bitcoin and stock market investment analysis.
  The vault strategy uses ATR-based volatility breakout with ADX and momentum filters to trade Bitcoin futures, employing dynamic trailing stops and volatility-based position sizing for risk management.

