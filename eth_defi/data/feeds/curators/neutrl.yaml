short_description: Neutrl is a crypto asset manager that operates NUSD, a digital dollar designed to reduce exposure to crypto price swings.
long_description: |
  Neutrl operates NUSD, a digital dollar backed by actively managed strategies intended to reduce exposure to broad crypto price movements. It also offers sNUSD, a token for people who choose to stake NUSD and receive strategy returns. Accountable identifies Neutrl as the manager of the Neutrl Ecosystem Vault.
