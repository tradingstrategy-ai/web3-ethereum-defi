short_description: CREDI provides on-chain private credit portfolios backed by real-world invoice and receivables finance.
long_description: |
  CREDI describes its product as on-chain private credit that unlocks yields from high-quality private credit portfolios.
  The official site says CREDI portfolios finance invoice and receivables facilities, use structural protection on deployments and bridge DeFi liquidity providers to traditional finance counterparties.
  CREDI's official LinkedIn announcement for its Turtle integration says users can deposit USDC into the CREDI vault on Ethereum for yield generated from real-world invoice and receivables financing.

