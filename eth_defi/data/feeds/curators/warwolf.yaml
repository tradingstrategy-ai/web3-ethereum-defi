short_description: Warwolf is a volatility-adaptive market-making vault on GRVT, managed by "The Siege Engineer", trading BTC, ETH, SOL and BNB perpetuals with beta-weighted micro-hedging and Z-score mean reversion.
long_description: |
  Warwolf operates the "Warwolf: Kinetic Volatility Capture" vault on the GRVT exchange under manager handle "The Siege Engineer".
  The strategy is a volatility-adaptive market maker that targets price dislocations on BTC, ETH, SOL and BNB liquid perpetuals, using beta-weighted micro-hedging against BTC correlation risk and Z-score mean-reversion windows to time entries at maximum market tension.
  Position sizing uses ATR-based risk controls with strict volatility caps, and a hardcoded auto-redemption limit of 85% acts as a safety mechanism.
  The vault carries a 1% annual management fee and a 15% performance fee, and is listed on the GRVT strategies page under the Market Making and Mean Reversion categories.

