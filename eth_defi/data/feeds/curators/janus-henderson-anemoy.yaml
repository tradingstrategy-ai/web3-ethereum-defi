short_description: Janus Henderson is a global active asset manager providing investment products across equities, fixed income, multi-asset and alternatives.
long_description: |
  Janus Henderson describes its mission as helping clients define and achieve financial outcomes through differentiated insights, disciplined investments and client service. The firm reports more than 90 years of investing experience, global investment capabilities and $479.6 billion in client assets under management as of 31 March 2026.
  Janus Henderson partnered with Anemoy and Centrifuge to manage Anemoy's tokenised on-chain fund, with Janus Henderson serving as sub-advisor and managing day-to-day fund operations and portfolio management through Tabula.
