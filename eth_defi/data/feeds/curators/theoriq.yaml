short_description: Theoriq builds AI-curated vault products for onchain yield, including AlphaVault for ETH-native yield and Theoriq Gold Vault.
long_description: |
  Theoriq builds AI-curated vault products for onchain yield, starting with AlphaVault for ETH and Theoriq Gold Vault for tokenised gold yield. Its AlphaVault materials describe a vault-of-vaults for ETH-native yield that uses an AI-supported research workflow to select and manage strategies within defined constraints. Theoriq Gold Vault uses tokenised gold collateral with continuous monitoring, allocation, and risk management by GoldSwarm AI. CuratorWatch tracks Theoriq as the curator of two Ethereum vaults, with about $308k AUM across lido and unknown protocol classifications.
