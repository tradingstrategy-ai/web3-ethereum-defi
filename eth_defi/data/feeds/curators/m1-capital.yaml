long_description: |
  M1 Capital describes itself as an Amsterdam-based digital-asset hedge fund pursuing market-neutral strategies. Its product materials include bespoke onchain vaults designed to generate DeFi-native yield and separately managed accounts for institutional clients.
  Upshift names M1 Capital as the strategist for its Resolv USR Yield Maxi vault on Ethereum. Upshift's own curator documentation also lists M1 Capital among existing vault curators.
