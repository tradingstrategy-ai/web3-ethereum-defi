short_description: Hyperbeat is a HyperEVM-native yield platform offering meta vaults, lending optimisers, and liquid-banking products on Hyperliquid.
long_description: |
  Hyperbeat describes itself as a modular, permissionless, fully on-chain financial stack built exclusively on HyperEVM.
  Its product suite includes meta vaults that continuously optimise yield across lending markets, Morpho-based lending optimiser vaults for USDC, USDT and beatUSD, delta-neutral strategies, HYPE liquid staking, and on-chain payment rails.
  Hyperbeat Labs is the core contributor and operates the vault infrastructure; the platform works with external risk managers such as Gauntlet and MEV Capital for certain Morpho market selections.
