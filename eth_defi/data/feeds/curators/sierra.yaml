long_description: |
  The Sierra Protocol issues SIERRA, a Liquid Yield Token built for access across DeFi, CeFi and TradFi. Sierra's documentation describes SIERRA reserves as a diversified portfolio of real-world financial assets and blue-chip DeFi yield sources, with SIERRA natively issued on Avalanche and bridged to Ethereum through LayerZero. CuratorWatch tracks Sierra as the curator of two USDC vaults under protocol sierra on Avalanche and Ethereum.
