short_description: CMS Asset Management (HK) is a Hong Kong licensed asset manager providing fund management and investment advisory services.
long_description: |
  CMS Asset Management (HK) is the asset-management platform of China Merchants Securities International. Its official profile describes cross-border asset management, investment consulting, fund management and personal wealth-management services under Hong Kong Type 4 and Type 9 licences.
  Asseto lists CMS Asset Management (HK) in its public product partner data as the investment manager or investment advisor for Asseto tokenised fund products.

