short_description: The Crypto Meerkat is a quantitative trader running a sentiment-driven directional Bitcoin vault on GRVT.
long_description: |
  The Crypto Meerkat operates a directional Bitcoin trading vault on the GRVT exchange, where they are listed among the first cohort of verified Strategy Managers.
  The published vault profile describes the manager as a Cambridge-educated PhD mathematician who has been trading crypto since 2020, across high-frequency, arbitrage and directional strategies.
  The strategy uses sentiment factors combined with trend models based on Bollinger bands and rolling linear regression, scaling leverage by signal agreement and applying fixed stop-loss and partial take-profit rules.

