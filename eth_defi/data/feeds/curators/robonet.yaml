short_description: RoboNet is an AI-native quantitative trading platform that builds, backtests, and deploys automated perpetual strategies across on-chain venues.
long_description: |
  RoboNet is an AI-native technology platform for quantitative trading strategy development and deployment, positioning itself as "the operating system for capital."
  It combines an LLM strategy engine with quantitative simulation tools and optional decentralised AI forecasts from the Allora network to convert trading intent into executable on-chain strategies.
  RoboNet curates long/short perpetual vaults across BTC, ETH and SOL on the GRVT and Lighter exchanges, with signals rebalanced every eight hours using volatility-normalised, confidence-weighted exposure rules.

