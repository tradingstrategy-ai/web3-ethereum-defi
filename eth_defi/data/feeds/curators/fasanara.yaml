short_description: Fasanara Capital is an institutional asset manager and fintech investing firm with a digital asset management business.
long_description: |
  Fasanara Capital describes itself as an institutional asset manager and fintech investing pioneer. Its digital business provides a managed-accounts platform for crypto trading strategies, including monitoring, risk management and asset-management services.
  Midas appoints Fasanara as strategy manager for mF-ONE, the tokenised strategy giving indirect exposure to Fasanara Capital's private-credit and digital-asset strategy.

