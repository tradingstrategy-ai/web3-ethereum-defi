short_description: Perseus Digital is a quantitative trading firm that designs and operates production-grade trading strategies.
long_description: |
  Perseus Digital describes itself as a quantitative trading firm deploying strategies
  across geographies and time horizons, with a focus on frontier markets. The firm
  designs and operates production-grade quantitative strategies and the systems that
  support them, combining research with engineering. Mezo identifies Perseus Digital
  as the curator of the Mezo Stable Vault, where the strategy focuses on delta-neutral
  stablecoin yield opportunities.

