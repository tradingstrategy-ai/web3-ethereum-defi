short_description: Sygnum is a digital-asset bank and tokenisation platform that administers permissioned investment products.
long_description: |
  Sygnum provides digital-asset banking and tokenisation infrastructure, including its Desygnate platform for issuing and administering permissioned tokenised products. The tracked FILQ share token uses Sygnum's permission manager, price-feed configuration and settlement infrastructure.

  Sygnum is retained as platform metadata for this infrastructure role. FILQ vault exports attribute the fund-management role to Fidelity International instead.

