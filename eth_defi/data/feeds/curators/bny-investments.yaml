short_description: BNY Investments is BNY's global multi-specialist asset-management business.
long_description: |
  BNY Investments is BNY's global asset-management business, providing investment solutions through specialist investment firms across public and private markets. It serves institutional, intermediary and individual investors.

  For this integration, BNY Investments is the curator of the Securitize Tokenized AAA CLO Fund (STAC) because it acts as the fund's sub-adviser. BNY acts as custodian for the fund's underlying assets, while Securitize provides the tokenisation platform.
