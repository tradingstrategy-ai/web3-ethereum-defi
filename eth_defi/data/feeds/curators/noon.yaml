short_description: Noon is a stablecoin protocol offering USN and its yield-bearing counterpart, sUSN.
long_description: |
  Noon offers USN, a stablecoin designed to track the US dollar, and sUSN, a token users can receive by staking USN. The protocol allocates collateral across a range of strategies and shares part of the resulting return with sUSN holders. Noon is listed as the manager for its USN and sUSN vaults on Accountable.
