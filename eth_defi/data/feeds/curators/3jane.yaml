# 3Jane curator - feeds provided by protocols/3jane.yaml
#
# Alias rationale:
# - 3Jane vaults are protocol-managed: the protocol itself operates every
#   vault (the USD3 senior tranche and the sUSD3 junior tranche), so the
#   protocol acts as its own curator. There is no external risk manager.
# - The 3Jane organisation's news source (Twitter @3janexyz) is carried by the
#   source-bearing protocol feeder protocols/3jane.yaml, so this curator aliases
#   that feeder to avoid scanning the account twice.
# - Official site: https://www.3jane.xyz/ ; docs: https://docs.3jane.xyz/
#
# Description sources:
# - https://docs.3jane.xyz/resources/faq
# - https://www.3jane.xyz/
feeder-id: 3jane
name: 3Jane
role: curator
canonical-feeder-id: 3jane
short_description: 3Jane is a decentralised credit-based money market that issues ERC-4626 stablecoin vaults backed by uncollateralised lending to crypto-native borrowers and fintech credit conduits.
long_description: |
  3Jane is a decentralised, credit-based money market on Ethereum that facilitates
  uncollateralised stablecoin lending. Depositors supply USDC and receive the protocol's
  ERC-4626 vault tokens — USD3 (the senior tranche) or, by staking USD3, sUSD3 (the junior
  tranche) — while the pooled capital is lent across two credit sleeves: uncollateralised
  USDC credit lines to crypto-native borrowers and funding conduits to U.S. fintech lenders.
  As the protocol operates its own vaults and sets their risk parameters, 3Jane acts as the
  curator of every vault it issues; the senior/junior waterfall determines how pool yield and
  losses are distributed between USD3 and sUSD3 holders.
