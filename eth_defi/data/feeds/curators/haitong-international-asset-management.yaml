short_description: Haitong International Asset Management (HK) is a Hong Kong licensed investment manager offering traditional and alternative investment funds and portfolio-management services.
long_description: |
  Haitong International Asset Management (HK) Limited is licensed by Hong Kong's Securities and Futures Commission for securities advice, futures advice and asset management. It issues and manages investment funds and provides portfolio-management and advisory services to institutional clients.

  The company manages the Haitong US Dollar Money Market Fund underlying Asseto's HTCASH+ token. Its ultimate controlling shareholder became Guotai Haitong Securities following the 2025 merger, while the manager's legal name and Haitong fund branding remain unchanged in its 2026 official materials.

