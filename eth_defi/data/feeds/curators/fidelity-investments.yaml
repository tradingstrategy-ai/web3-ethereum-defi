short_description: Fidelity Investments is a financial-services company and the investment manager of the Fidelity Treasury Digital Fund.
long_description: |
  Fidelity Investments provides investment management and financial services to individual and institutional clients. Its Fidelity Treasury Digital Fund includes an OnChain share class represented by FDIT, while DTCC supplies the tokenisation and compliance infrastructure rather than acting as the fund manager.
