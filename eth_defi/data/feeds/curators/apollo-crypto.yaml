short_description: Apollo Crypto is an Australian crypto-asset fund manager offering multi-strategy, frontier and market-neutral funds.
long_description: |
  Apollo Crypto manages crypto-asset funds for wholesale and institutional investors, with multi-strategy, frontier and market-neutral offerings. Its market-neutral fund seeks to exploit inefficiencies in crypto markets while focusing on capital preservation.
  Midas' mAPOLLO liquid yield token tracks an Apollo Crypto yield strategy on Ethereum, so Apollo Crypto is recorded as the strategy curator for this product.
