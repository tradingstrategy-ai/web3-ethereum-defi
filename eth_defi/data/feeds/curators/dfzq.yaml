long_description: |
  Orient Securities is a Chinese securities firm that operates in Hong Kong under the DFZQ brand. Its official materials describe securities brokerage, futures brokerage, asset management and investment-banking activities through its international business.
  Asseto lists DFZQ / Orient Securities International as investment advisor for its AoABTd tokenised fund product.

