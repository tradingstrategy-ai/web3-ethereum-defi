symbol: USDA
name: Avalon USDa
short_description: Avalon USDa is a Bitcoin-backed stablecoin issued by Avalon Finance, a CeDeFi (Centralised-Decentralised Finance) lending platform. Users mint USDa by depositing BTC or USDT as collateral through a CDP mechanism. USDa operates across multiple chains including Ethereum, Mantle, and BNB Smart Chain.
long_description: |
  Avalon USDa is the flagship stablecoin of [Avalon Finance](https://avalonfinance.xyz/) (Avalon Labs),
  a CeDeFi platform that combines centralised and decentralised finance for Bitcoin-backed lending.

  ## Mechanism

  USDa is minted through a collateralised debt position (CDP) system:
  - Users deposit Bitcoin (BTC) or USDT as collateral
  - USDT deposits are accepted 1:1
  - Loan repayment or USDT conversion is required for redemption

  ## Yield

  USDa can be used within the Avalon ecosystem through USDaLend, a lending protocol that
  allows users to lend and borrow using Bitcoin-backed stablecoins.

