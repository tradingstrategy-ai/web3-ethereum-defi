symbol: NaraUSD
name: NaraUSD
short_description: |
  NaraUSD is a synthetic digital dollar issued by Nara and designed to track the US
  dollar. It is backed by short-term payment financing (PayFi) assets sourced from
  cross-border payment transactions.
long_description: |
  [NaraUSD](https://docs.nara.io/nara-protocol/narausd) is Nara's synthetic digital
  dollar. Nara states that its reserve is backed by a diversified portfolio of
  real-world, short-term payment-financing (PayFi) assets sourced from cross-border
  transactions and that the token is designed to maintain a 1:1 USD value.

  Minting and direct redemption are available to authorised, KYC/KYB-completed users.
  The protocol maintains a liquid reserve for redemptions and may queue larger
  redemption requests while its short-term financing positions mature.

  ## Sources

  - [NaraUSD documentation](https://docs.nara.io/nara-protocol/narausd)
  - [Nara application](https://app.nara.io/swap)
