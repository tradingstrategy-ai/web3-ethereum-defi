symbol: agEUR
name: Angle EURA
short_description: agEUR (rebranded to EURA) is a Euro-pegged stablecoin issued by Angle Protocol on Ethereum. It is backed by overcollateralised loans and yield-bearing reserves managed by the protocol. The
  same contract address is used for both the agEUR and EURA names.
long_description: |
  agEUR is the original ticker for the Euro stablecoin issued by [Angle Protocol](https://www.angle.money/),
  a decentralised and capital-efficient stablecoin protocol. The token was later rebranded to **EURA**
  but the contract address remained unchanged.

  ## Mechanism

  - Euro-pegged, targeting a 1:1 value with EUR
  - Initially backed by over-collateralised loans (similar to DAI's CDP model) and hedging agents
  - Protocol evolved to support multiple collateral types and cross-chain minting
  - Angle V2 introduced a new architecture with transmuter and savings modules

  ## Status

  Active and live. Circulating supply is approximately 2.7 million EURA as of early 2026.

  ## Sources

  - [Angle Protocol documentation](https://docs.angle.money/)
  - [Etherscan: EURA/agEUR on Ethereum](https://etherscan.io/token/0x1a7e4e63778B4f12a199C062f3eFdD288afCBce8)
  - [DeFiLlama: agEUR stablecoin page](https://defillama.com/stablecoin/ageur)
