symbol: GHST
name: Aavegotchi GHST
short_description: GHST is the governance and utility token of Aavegotchi, a DeFi-staked NFT gaming platform built on Aave. It is not a stablecoin but is included in the stablecoin-like set for tracking purposes.
  Aavegotchi combines DeFi yield farming with NFT gaming mechanics.
long_description: |
  [Aavegotchi](https://aavegotchi.com/) is a DeFi-integrated NFT gaming protocol where each
  Aavegotchi NFT holds an Aave-backed collateral position ("Spirit Force") as its core value layer.
  GHST is the protocol's eco-governance token used across the Aavegotchi ecosystem.

  ## Mechanism

  Each Aavegotchi NFT holds an escrow contract containing aTokens — yield-bearing tokens from
  [Aave](https://aave.com/) — which continuously accrue value over time. GHST is the primary
  medium of exchange for purchasing portals, wearables, and NFTs in the Aavegotchi marketplace.
  Holders of GHST receive voting power in AavegotchiDAO at a rate of 1 vote per token.

  GHST was originally launched via a DAI-backed bonding curve smart contract (powered by Aragon
  Fundraising) on 14 September 2020. The bonding curve was closed on 11 March 2023 following
  community vote AGIP-64, capping the total supply at approximately 52.7 million GHST and making
  it a fully free-floating token. The 30.3 million DAI raised was distributed equally between
  liquidity provisioning, the DAO, Pixelcraft Studios, and protocol rewards.

  ## Key properties

  - Governance token for AavegotchiDAO — 1 GHST = 1 vote
  - Fixed supply since bonding curve closure in March 2023
  - Fully decentralised: no admin privileges, no backdoors
  - Native currency for Gotchiverse land and item trading

