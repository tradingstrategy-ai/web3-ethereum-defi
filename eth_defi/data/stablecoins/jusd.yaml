symbol: jUSD
name: Aegis jUSD
short_description: Aegis jUSD is a dollar-pegged token backed by hedged JLP positions.
long_description: |
  [Aegis](https://aegis.im/yield-as-a-service) issues jUSD as a digital dollar.
  Its backing uses JLP, the liquidity-provider token for Jupiter's perpetual futures
  exchange, together with hedges intended to reduce the effect of market-price
  movements. Aegis publishes information about the product's reserves and positions.

  jUSD holders may receive rewards from the underlying strategy. The token is not a
  claim on a bank deposit, and its ability to maintain a dollar value depends on
  Aegis's collateral, hedging, and operational arrangements.
