- name: Satoshi Stablecoin
  short_description: Satoshi Stablecoin (satUSD) is a BTC-backed stablecoin from Satoshi Protocol (River). It allows users to borrow satUSD against Bitcoin collateral via an Omni-CDP supporting BTCB and wBTC. The protocol operates across Bitcoin, EVM, and Solana ecosystems.
  long_description: |
    satUSD is an overcollateralised stablecoin issued by [Satoshi Protocol](https://www.satoshiprotocol.org/)
    (now operating under the [River](https://river.inc/) brand). It is the first Bitcoin Finance (BTCFi)
    stablecoin built around an Omni-CDP model, enabling users to collateralise BTC-denominated assets on
    one chain and mint satUSD natively on another — without wrapping or bridging.

    ## Mechanism

    Users deposit collateral — including BTCB, wBTC, tBTC, solvBTC, ETH, BNB, and various liquid staking
    tokens — and mint satUSD subject to a minimum collateralisation ratio of 110–150% depending on the
    asset. A one-time minting fee applies (0.5%–5%). Cross-chain minting is powered by
    [LayerZero's OFT standard](https://layerzero.network/), allowing satUSD to circulate across EVM
    networks and Solana without a traditional bridge.

    The peg is maintained through real-time liquidations, on-chain arbitrage, and five layers of risk
    control. Users can stake satUSD to receive satUSD+, a yield-bearing token that shares protocol revenue.

    With the rebrand to River, the protocol expanded its chain-abstraction approach: users can collateralise
    assets on Ethereum, Base, BSC, Hemi, or BOB, and mint satUSD on any supported destination chain.

    ## Key properties

    - BTC-native and EVM multi-chain; powered by LayerZero OFT
    - Overcollateralised CDP; minimum ratio 110–150% depending on asset
    - Integrated with Chainlink Price Feeds for oracle security
    - Yield-bearing satUSD+ staking token

    ## Sources

    - [Satoshi Protocol](https://www.satoshiprotocol.org/)
    - [River — Satoshi V2 announcement](https://blog.river.inc/introducing-satoshi-v2/)
    - [CoinGecko — Satoshi Stablecoin](https://www.coingecko.com/en/coins/satoshi-stablecoin)
