- name: River Protocol satUSD
  short_description: River Protocol's satUSD is a stablecoin designed for the Bitcoin ecosystem. It provides stable value within Bitcoin-native DeFi applications.
  long_description: |
    River Protocol's satUSD is the cross-chain stablecoin at the heart of the [River](https://river.inc/)
    chain-abstraction system. River evolved from Satoshi Protocol v2 into a full chain-abstraction
    stablecoin infrastructure, with satUSD as its core liquidity primitive.

    ## Mechanism

    River's Omni-CDP model allows users to collateralise assets on a source chain and mint satUSD
    natively on any destination chain supported by LayerZero OFT — no bridges or wrapped assets are
    required. Supported collateral includes BTC, ETH, BNB, and various liquid staking tokens (LSTs).
    satUSD supply was approximately $293 million as of September 2025, deployed across Hemi, BSC,
    Ethereum, Base, and BOB.

    Users can stake satUSD to receive satUSD+, a yield-bearing token that accrues protocol revenue.
    River also offers a Prime Vault product for institutional depositors, integrated with leading
    custodians for operational simplicity.

    ## Key properties

    - Chain-abstraction: collateralise on Chain A, mint on Chain B
    - Powered by LayerZero OFT across 8+ chains
    - satUSD+ yield staking token
    - Institutional Prime Vault product

    ## Sources

