symbol: wM
name: M^0 Wrapped M
short_description: Wrapped M (wM) is the wrapped version of the M token from M^0 Protocol. M^0 is a decentralised stablecoin infrastructure that allows approved minters to issue M against eligible collateral.
  wM enables M to be used across DeFi protocols.
long_description: |
  Wrapped M (wM) is a non-rebasing ERC-20 wrapper around M, the rebasing USD stablecoin
  from [M^0 Protocol](https://www.m0.org/). Because the underlying M token is rebasing
  (balances change as interest accrues), wM provides a static-balance representation
  needed for DeFi protocol compatibility.

  ## M^0 Protocol

  M^0 is decentralised stablecoin infrastructure that allows approved institutional
  minters to issue M (and its wrapped form wM) against eligible collateral. The protocol
  uses a two-token governance model (TTG) to manage minter approvals, collateral rules,
  and yield parameters. M^0 was deployed on Ethereum Mainnet on 7 May 2024, with wM
  following on 14 August 2024.

