symbol: WXDAI
name: Wrapped xDAI (Gnosis)
short_description: Wrapped xDAI (WXDAI) is the ERC-20 wrapped version of xDAI, the native gas token of Gnosis Chain. xDAI is a DAI-backed stablecoin bridged from Ethereum to Gnosis Chain. WXDAI enables xDAI to
  be used in DeFi protocols that require ERC-20 tokens.
long_description: |
  [Gnosis Chain](https://www.gnosis.io/) (formerly xDai Chain) uses xDAI as its native gas token.
  xDAI is a 1:1 representation of [DAI](https://makerdao.com/) bridged from Ethereum via the
  xDai Bridge: DAI is locked in a smart contract on Ethereum and an equivalent amount of xDAI is
  minted on Gnosis Chain; burning xDAI unlocks the corresponding DAI on Ethereum.

  ## Mechanism

  Because xDAI is the native coin of Gnosis Chain (analogous to ETH on Ethereum), it does not
  conform to the ERC-20 token standard. Wrapped xDAI (WXDAI) is an ERC-20 wrapper that allows
  xDAI to be used seamlessly within DeFi protocols, decentralised exchanges, and liquidity pools
  that require standard ERC-20 tokens.

  The wrapping contract is a standard WETH-style contract deployed on Gnosis Chain at
  `0xe91D153E0b41518A2Ce8Dd3D7944Fa863463a97d`. Users deposit xDAI and receive WXDAI 1:1;
  unwrapping burns WXDAI and returns xDAI.

  ## Key properties

  - Soft-pegged to USD via DAI → xDAI bridge
  - Used for gas fees on Gnosis Chain (as xDAI) and DeFi interactions (as WXDAI)
  - Trustless bridge with smart contracts on both Ethereum and Gnosis Chain
  - Low-cost transactions make Gnosis Chain a popular venue for micro-payments and prediction markets

  ## Sources

