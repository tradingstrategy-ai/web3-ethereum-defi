  - [Gnosis Chain docs — xDai Bridge](https://docs.gnosischain.com/bridges/About%20Token%20Bridges/xdai-bridge)
  - [CoinGecko — Wrapped xDAI](https://www.coingecko.com/en/coins/wrapped-xdai)
