long_description: |
  TerraClassicUSD (USTC) is the post-collapse renamed version of UST on Terra Classic (LUNC chain).
  Following the catastrophic May 2022 depeg, the original Terra blockchain forked into Terra Classic and a new Terra chain.
  USTC remains on the Terra Classic chain and trades at a deep discount to $1.

  It is considered defunct as a stablecoin and has no functional peg mechanism.

  ## Terraform Labs wind-down

  Terraform Labs (TFL) agreed to pay $4.5 billion to the SEC and received bankruptcy court approval to
  wind down its operations, with products shut down on October 30, 2024. The terra.money homepage
  now displays a formal wind-down notice. USTC remains on the Terra Classic chain but has no
  functioning peg mechanism and is considered defunct as a stablecoin.

