long_description: |
  TerraClassicUSD (USTC) is the post-collapse renamed version of UST on Terra Classic (LUNC chain).
  Following the catastrophic May 2022 depeg, the original Terra blockchain forked into Terra Classic and a new Terra chain.
  USTC remains on the Terra Classic chain and trades at a deep discount to $1.

  It is considered defunct as a stablecoin and has no functional peg mechanism.

