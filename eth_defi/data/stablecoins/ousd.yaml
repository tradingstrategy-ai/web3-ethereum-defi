symbol: OUSD
name: Origin Dollar
short_description: Origin Dollar (OUSD) is a yield-bearing stablecoin issued by Origin Protocol on Ethereum. It automatically earns yield from DeFi strategies (currently Morpho) while sitting in holders' wallets, with no staking required. OUSD is backed by USDC, DAI, and USDT.
long_description: |
  OUSD is issued by [Origin Protocol](https://www.originprotocol.com/ousd) on Ethereum.
  It is a rebasing ERC-20 token: the token balance in holders' wallets increases automatically
  as yield accrues, without any staking or lock-up.

  ## Mechanism

  - Backed 1:1 by USDC, DAI, and USDT held in reserve
  - Yield is generated by deploying reserves into Morpho (previously also Aave, Compound)
  - Auto-compounding — yields distribute directly to wallets
  - Governance via OGN (Origin Protocol token) stakers
  - 12+ security audits; operational since 2020

  ## Security history

  In November 2020 OUSD suffered a flash-loan exploit draining approximately $7 million.
  The protocol was subsequently relaunched with an upgraded, audited contract.

  ## Status

  Active on Ethereum with approximately $5.8 million TVL and a 5.49% 30-day APY (as of early 2025).
  The current contract at `0x2A8e1E676Ec238d8A992307B495b45B3fEAa5e86` is the post-exploit version.

  ## Sources

  - [Origin Protocol — OUSD](https://www.originprotocol.com/ousd)
  - [DeFiLlama — Origin Dollar](https://defillama.com/stablecoin/origin-dollar)
  - [Etherscan — OUSD](https://etherscan.io/token/0x2A8e1E676Ec238d8A992307B495b45B3fEAa5e86)
