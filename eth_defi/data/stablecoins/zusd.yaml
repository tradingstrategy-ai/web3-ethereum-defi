long_description: |
  ZUSD is a USD-backed stablecoin issued by [GMO-Z.com Trust Company](https://stablecoin.z.com/),
  a wholly-owned subsidiary of GMO Internet Group, Japan's largest internet conglomerate.
  GMO Trust was established in 2020 and holds a Limited Purpose Trust Charter from the
  New York State Department of Financial Services (NYDFS).

  ## Mechanism

  ZUSD is fully reserved: each token is backed 1:1 by US dollars held at FDIC-insured banks.
  Issuance and redemption are handled directly by GMO Trust, targeting institutional clients
  and regulated exchange integrations. ZUSD is consistently maintained on the NYDFS Greenlist —
  the list of pre-approved virtual currencies for custody and trading by NYDFS-licensed entities.

  ZUSD is issued alongside GYEN (GMO's JPY stablecoin) on Ethereum and has been listed on
  exchanges including Bitstamp. Institutional custody is available through Komainu.

  ## Key properties

  - Fully USD-backed, 1:1 reserve
  - NYDFS-regulated via Limited Purpose Trust Charter
  - On NYDFS Greenlist for custody and trading
  - Issued by a subsidiary of GMO Internet Group (Tokyo Stock Exchange listed)

