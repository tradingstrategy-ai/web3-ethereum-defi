symbol: USDf
name: Falcon Finance USD
short_description: USDf is a stablecoin issued by Falcon Finance, focused on delta-neutral yield strategies. It provides stable value backed by hedged crypto positions. Falcon Finance is designed for both institutional
  and DeFi use.
long_description: |
  [Falcon Finance](https://falcon.finance/) issues USDf as a synthetic dollar backed by
  hedged crypto positions. Users deposit eligible assets — stablecoins such as USDC/USDT
  at a 1:1 ratio, or non-stablecoin crypto assets — which are overcollateralised and
  delta-hedged by Falcon's proprietary trading strategies. The protocol targets institutional
  and DeFi participants seeking stable yield.

  ## Mechanism

  Falcon maintains the USD peg through a delta-neutral strategy: spot crypto positions are
  offset by short perpetual futures positions, eliminating directional price exposure. The
  protocol captures yield from positive funding rates (holding spot, shorting perps) and
  can also generate returns in negative funding rate environments by inverting the position.
  An on-chain Insurance Fund provides a backstop against extreme market stress.

  Reserve attestations are published weekly by HT Digital, with quarterly ISAE 3000
  assurance reports, providing verifiable proof of backing.

  sUSDf is the staked, yield-bearing version of USDf: holders deposit USDf to receive sUSDf,
  which appreciates in value as yield accrues. USDf surpassed $2 billion in supply by October 2025.

  ## Key properties

  - Delta-neutral synthetic dollar — no directional crypto exposure
  - Accepts stablecoins (1:1 mint) and crypto collateral (overcollateralised)
  - Weekly reserve attestations and quarterly ISAE 3000 reports
  - Insurance Fund as on-chain last-resort backstop

