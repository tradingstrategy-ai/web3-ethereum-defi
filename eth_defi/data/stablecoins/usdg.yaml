long_description: |
  [Global Dollar (USDG)](https://globaldollar.com/) is a USD-backed stablecoin issued by
  Paxos Digital Singapore Pte. Ltd. and governed under the
  [Global Dollar Network](https://globaldollar.com/) — a consortium of major financial and
  crypto firms including Anchorage Digital, Bullish, Galaxy Digital, Kraken, Nuvei, Paxos,
  and Robinhood. Mastercard and Fiserv subsequently joined the network. USDG launched in
  November 2024 and is substantively compliant with the Monetary Authority of Singapore
  (MAS) stablecoin framework; it is also issued in Europe by Paxos Issuance Europe under
  MiCA supervision by the Finnish Financial Supervisory Authority (FIN-FSA).

  ## Reserve backing

  Every USDG token is backed 1:1 by high-quality liquid assets: US dollar deposits, short-
  duration US government securities, and equivalent cash instruments. Reserves are held and
  managed by Paxos Digital Singapore via DBS Bank, with monthly third-party attestation
  reports published publicly.

  ## Yield-sharing model

  The defining feature of USDG is its revenue-sharing design. Approximately 97% of the net
  interest income generated by the reserve assets is distributed back to Global Dollar Network
  partners in proportion to their contribution to USDG adoption and liquidity. Partners can
  earn yield on USDG balances held on their platforms and receive additional revenue for
  minting and accepting the token — an incentive structure intended to accelerate stablecoin
  adoption across exchanges, wallets, and payment networks.

  ## Technical details

  USDG is an ERC-20 token on Ethereum (contract `0xe343167631d89B6Ffc58B88d6b7fB0228795491D`)
  and is also available on Solana and several other MAS-approved networks. The Ethereum
  contract uses OpenZeppelin's UUPS upgradeable proxy pattern. Source code is published at
  [github.com/paxosglobal/usdg-contract](https://github.com/paxosglobal/usdg-contract).

