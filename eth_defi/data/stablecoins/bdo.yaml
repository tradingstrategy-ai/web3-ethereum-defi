long_description: |
  bDollar was an early algorithmic stablecoin on [BNB Smart Chain](https://www.bnbchain.org/),
  inspired by [Basis Cash](https://basis.cash/). It launched in late 2020 as part of a wave of
  seigniorage-model forks attempting to build collateral-free, algorithmically stabilised dollar pegs.

  ## Mechanism

  Three-token seigniorage model (mirroring Basis Cash):
  - **BDO** — the stablecoin targeting $1.00
  - **sBDO** (bDollar Share) — seigniorage and governance token
  - **bBDO** (bDollar Bond) — bond token for peg recovery

  ## Status

  **Defunct.** BDO lost its peg and the protocol has been abandoned. The website bdollar.fi is no longer
  maintained.

  ## Sources

  - [CoinGecko: bDollar](https://www.coingecko.com/en/coins/bdollar)
