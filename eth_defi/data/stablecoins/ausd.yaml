- name: Agora Dollar
  short_description: Agora Dollar (AUSD) is a digital dollar stablecoin minted 1:1 with USD fiat. It uses institutional-grade custodians, a Big Four auditor, and a top-tier fund manager to safeguard reserves.
    AUSD is gas-optimised and deployed across Ethereum, Base, Arbitrum, Solana, and many other chains using a single contract address.
  long_description: |
    [Agora](https://www.agora.finance/) issues AUSD, a fully reserved digital dollar backed 1:1 by cash,
    overnight repurchase and reverse repurchase agreements, and short-term US Treasury securities.
    The reserve fund is administered by [State Street](https://www.statestreet.com/) as custodian and managed
    by [VanEck](https://www.vaneck.com/), with assets held in a bankruptcy-remote trust.

    ## Mechanism

    - Users mint AUSD by depositing USD; the funds are placed into the Agora Reserve Fund
    - Monthly management reports and real-time [Chaos Labs](https://chaoslabs.xyz/) proof-of-reserves data
      provide on-chain verifiable backing
    - Unlike USDT and USDC, Agora shares reserve yield with ecosystem partners (liquidity providers, integrators,
      payment processors) rather than retaining it entirely

    ## Key properties

    - Single contract address reused across all supported chains via LayerZero OFT interoperability
    - Deployed on 12+ chains including Ethereum, Base, Arbitrum, Solana, and Injective
    - Raised $12M seed (2024) and $50M Series A (July 2025) from Paradigm and VanEck

    ## Sources

    - [Agora AUSD product page](https://www.agora.finance/product/ausd)
