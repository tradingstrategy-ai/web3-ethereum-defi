- name: Acala Dollar
  short_description: Acala Dollar (aUSD) is the native decentralised stablecoin of the Acala network on Polkadot. It is overcollateralised and multi-collateral-backed, designed for cross-chain DeFi. aUSD suffered
    a depeg exploit in August 2022 and has very limited usage today.
  long_description: |
    [Acala](https://acala.network/) is a DeFi hub on the [Polkadot](https://polkadot.network/) parachain.
    aUSD was its native decentralised stablecoin, issued via the Honzon protocol using an overcollateralised
    CDP (collateralised debt position) model backed by multiple cross-chain assets including DOT, LDOT, and iBTC.

    ## The August 2022 exploit

    On 14 August 2022, a misconfiguration in the newly deployed iBTC/aUSD liquidity pool allowed 16 addresses
    to erroneously mint approximately 3.022 billion aUSD from thin air. The price of aUSD collapsed from ~$1.03
    to $0.009 within minutes — a 99% depeg. Acala entered error mode, pausing most network operations.
    Following emergency governance votes, approximately 2.97 billion of the erroneously minted tokens were
    traced and 1.29 billion were burnt, allowing the peg to partially recover to ~$0.93 before further burns
    restored near-parity.

    ## Status

    aUSD never fully recovered market confidence after the exploit. Circulating supply and on-chain usage
    remain negligible. The token is still listed on CoinGecko but has very low volume and liquidity.

    ## Sources

    - [CoinDesk — Acala's stablecoin falls 99%](https://www.coindesk.com/tech/2022/08/15/acalas-stablecoin-falls-99-percent-after-hackers-issue-13-billion-tokens)
