symbol: sUSDai
name: Staked USDai (USD.AI)
short_description: sUSDai is the yield-bearing ERC-4626 staking token for USDai, a synthetic dollar backed by GPU compute infrastructure. Users stake USDai to receive sUSDai, which accrues yield from repayments on GPU-backed loans. The USD.AI protocol had over $600M TVL in early 2026.
long_description: |
  sUSDai is issued by [USD.AI](https://usd.ai/) (also known as Permian Labs) as the staking layer for USDai. USDai is an over-collateralised synthetic dollar backed by tokenised GPU compute power — users provide capital collateralised by GPU hardware loans to AI infrastructure companies.

  When users deposit USDai into the staking contract, they receive sUSDai (an ERC-4626 vault token) that accrues yield from repayments on loans issued against tokenised GPUs. [PayPal's PYUSD](https://www.paypal.com/pyusd) was integrated as a reserve asset in December 2024.

  The protocol operates primarily on Arbitrum and Ethereum. A governance token (CHIP) was being prepared for launch in Q1 2026. sUSDai is listed on [CoinGecko](https://www.coingecko.com/en/coins/staked-usdai) and USDai on [DefiLlama](https://defillama.com/stablecoin/usd.ai).
