symbol: PAR
name: MIMO Protocol PAR
short_description: PAR is a Euro-pegged stablecoin issued by MIMO Protocol on Ethereum and Polygon. It is overcollateralised by crypto assets (WETH, WBTC, USDC) deposited in MIMO vaults. PAR enables Euro-denominated DeFi activities.
long_description: |
  PAR is issued by [MIMO Protocol](https://par.mimo.capital/) (previously known as Parallel),
  an overcollateralised stablecoin protocol. Users deposit accepted collateral into MIMO vaults
  and receive PAR loans denominated in Euro.

  ## Mechanism

  - Overcollateralised vaults backed by WETH, WBTC, USDC, and other approved collateral
  - Pegged to the Euro (EUR), not USD
  - Available on Ethereum and Polygon
  - MIMO is the governance token

  ## Status

  Active on Ethereum with approximately 2.24 million PAR in circulation and a current market price
  of approximately $1.30 USD per PAR (reflecting EUR/USD exchange rate).

  ## Sources

  - [MIMO Protocol](https://mimo.capital/)
