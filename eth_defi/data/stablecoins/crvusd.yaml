symbol: CRVUSD
name: Curve USD
short_description: crvUSD is the native stablecoin of Curve Finance, the leading decentralised exchange for stable assets. It uses the LLAMMA (Lending-Liquidating AMM Algorithm) mechanism that converts collateral
  to crvUSD gradually during soft liquidations, reducing liquidation risk for borrowers.
long_description: |
  crvUSD is issued by [Curve Finance](https://curve.fi/), one of the largest and most battle-tested DEXs in DeFi.
  Unlike traditional CDP stablecoins that use hard liquidations, crvUSD uses LLAMMA — an AMM-based
  liquidation mechanism that gradually converts collateral to crvUSD as prices fall, allowing borrowers
  more time to add collateral or repay.

  ## Mechanism

  - Overcollateralised CDP model using various collateral types (stETH, ETH, WBTC, USDC, and others)
  - LLAMMA performs soft liquidations: collateral is sold gradually across a price band rather than all at once
  - Uses Curve's own price oracles (exponential moving average) for manipulation resistance
  - PegKeepers maintain the peg by minting/burning crvUSD in Curve pools
  - Deployed on Ethereum (primary) and bridged to multiple other chains

  ## Sources

