long_description: |
  USDtb is a stablecoin issued by [Ethena Labs](https://ethena.fi/) as a conservatively backed complement to USDe.
  Its primary reserve asset is BlackRock's BUIDL fund (tokenised US Treasuries), with additional backing from
  other tokenised money-market instruments.

  ## Purpose

  USDtb is designed for institutional participants who prefer traditional asset backing over synthetic/delta-neutral
  backing. It provides Ethena's broader ecosystem with a stable, low-risk alternative that can serve as collateral
  or backing when USDe's delta-neutral funding strategy is less attractive.

