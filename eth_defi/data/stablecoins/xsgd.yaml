long_description: |
  [XSGD](https://www.straitsx.com/xsgd) is a Singapore Dollar-backed stablecoin issued by
  [StraitsX](https://www.straitsx.com/), a payment infrastructure provider incorporated in
  Singapore. Each XSGD token is backed 1:1 by Singapore Dollar reserves held in regulated financial
  institutions in Singapore.

  ## Issuer and regulation

  StraitsX (via its subsidiary StraitsX SGD Issuance Pte. Ltd.) holds a Major Payment Institution
  (MPI) licence from the Monetary Authority of Singapore (MAS) under the Payment Services Act 2019,
  covering digital payment token services. In 2024 MAS granted StraitsX In-Principle Approval (IPA)
  as a single-currency stablecoin issuer under MAS's forthcoming stablecoin regulatory framework.
  Reserves must be maintained at no less than 100% of the outstanding XSGD supply in cash or MAS- or
  US Treasury-issued debt securities.

  ## Deployment and payments use case

  XSGD was launched in 2020 and is available natively on Ethereum, Polygon, and the XRP Ledger, with
  further deployment on Solana announced for 2026. It was the first Singapore Dollar stablecoin listed
  on Coinbase. StraitsX positions XSGD as infrastructure for real-world payments in Southeast Asia,
  enabling businesses and individuals to settle cross-border transactions in SGD on-chain without
  relying on correspondent banking rails.

  ## Key properties

  - 1:1 backed by SGD reserves; attested by independent accountants
  - Issued by a MAS-licensed Major Payment Institution
  - Travel Rule compliant
  - Available on Ethereum, Polygon, XRP Ledger; Solana launch planned for 2026
  - First SGD stablecoin listed on Coinbase

