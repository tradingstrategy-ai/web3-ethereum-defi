symbol: USDC.e
name: Bridged USDC
short_description: USDC.e is a bridged version of USDC on various L2 and alt-L1 chains. It represents USDC locked on Ethereum and bridged to another network via a canonical bridge. USDC.e is being phased out
  as Circle deploys native USDC on more chains.
long_description: |
  USDC.e (also written as USDCe or "bridged USDC") is a form of USDC that has been transferred from Ethereum to another blockchain via a canonical bridge. When USDC is bridged, the original tokens are locked in a smart contract on Ethereum and an equivalent amount of USDC.e is minted on the destination chain. The ".e" suffix indicates the token's Ethereum origin. USDC.e is **not** issued directly by [Circle](https://www.circle.com/usdc); rather it is a wrapped representation of Circle-issued USDC.

  ## Mechanism

  Bridging works by locking USDC on Ethereum and minting a corresponding USDC.e token on the destination network (e.g. Arbitrum One, Avalanche C-Chain, Polygon PoS, Optimism). The bridge operator is typically the canonical bridge for that network. Redemption reverses the process: burning USDC.e on the destination chain releases the locked USDC on Ethereum.

  ## Migration to native USDC

  As Circle began deploying native USDC directly on Layer-2 networks in mid-2023 (Arbitrum, Optimism, Polygon, Base, and others via the Cross-Chain Transfer Protocol, CCTP), USDC.e began to be phased out on chains where native USDC exists. Users holding USDC.e can swap it for native USDC on decentralised exchanges, or bridge it back to Ethereum. Major DeFi protocols have progressively migrated liquidity from USDC.e to native USDC as Circle's multi-chain rollout has expanded.

  ## Key properties

  - Backed by USDC locked on Ethereum via a canonical bridge
  - Not issued by Circle; counterparty risk depends on the bridge operator
  - Accepted across DeFi on Arbitrum, Avalanche, Polygon, Optimism, and other chains
  - Being gradually phased out where Circle now issues native USDC directly

