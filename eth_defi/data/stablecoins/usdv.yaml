symbol: USDV
name: Verified USD
short_description: Verified USD (USDV) is a stablecoin backed by STBT (Short-Term Treasury Bill Token). It is designed for multi-chain deployment with built-in yield from US Treasury exposure. USDV uses LayerZero
  for cross-chain transfers.
long_description: |
  Verified USD (USDV) is an omnichain stablecoin backed 1:1 by STBT (Short-Term Treasury Bill Token), issued by
  [Matrixdock](https://www.matrixdock.com/). It distributes yield from underlying US Treasury exposure to registered
  colourisers (the entities that create USDV).

  ## Mechanism

  - Backed by STBT, a tokenised short-term Treasury product
  - Uses LayerZero for cross-chain transfers
  - Colourisers (verified institutions and protocols) can mint USDV and earn a share of the T-Bill yield

  ## Status

  In November 2024, the Verified USD Foundation announced it would remove all USDV from circulation,
  with support ending on December 31, 2024. Holders were directed to convert USDV to USDC at a 1:1 ratio.
  Multiple exchanges delisted USDV in late November–December 2024. USDV is considered defunct.

