long_description: |
  USG is the decentralised, overcollateralised USD stablecoin of [Tangent Finance](https://www.tangent.finance/),
  a DeFi protocol focused on capital efficiency. Unlike most CDP stablecoins, USG accepts productive LP tokens and
  yield-bearing assets from Curve, Convex, Pendle, Stake DAO, and Spectra as collateral.

  ## Mechanism

  - Overcollateralised CDP model — users deposit productive collateral and borrow USG
  - Zero-interest borrowing available in dedicated High Emissions Collateral markets
  - Dynamic interest rate model activates only when USG trades below its price threshold
  - sUSG is the yield-bearing variant (ERC-4626) that distributes protocol revenue to holders

  ## Sources

  - [Tangent Finance](https://www.tangent.finance/)
  - [Tangent Finance docs](https://docs.tangent.finance/)
