long_description: |
  vbUSDT is a bridged version of USDT on the [Katana](https://katana.network/) network via Vault Bridge,
  which is managed by Katana using [AggLayer's](https://agglayer.dev/) bridge infrastructure.
  It represents USDT locked on Ethereum and bridged to Katana.

  For more information, see the [Katana chain page](https://tradingstrategy.ai/trading-view/vaults/chains/katana).
