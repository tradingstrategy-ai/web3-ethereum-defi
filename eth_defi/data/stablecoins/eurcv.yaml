long_description: |
  [EUR CoinVertible (EURCV)](https://www.sgforge.com/product/coinvertible/) is a Euro-denominated stablecoin issued by [SG-FORGE](https://www.sgforge.com/), the digital asset subsidiary of French bank Société Générale.
  It was the first institutional stablecoin deployed on a public blockchain by a major European bank, launched in April 2023 on Ethereum.

  EURCV is a regulated instrument designed for institutional participants.
  It is fully backed by Euros held in reserve and settles on-chain, enabling DeFi integrations while complying with applicable securities regulations.
  SG-FORGE has subsequently deployed EURCV in DeFi protocols including MakerDAO (now Sky) and Aave.
  In 2025, SG-FORGE expanded EURCV to the Stellar blockchain and also announced a USD-denominated stablecoin (USDCV) with BNY as custodian.
