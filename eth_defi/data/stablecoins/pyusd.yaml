symbol: PYUSD
name: PayPal USD
short_description: PayPal USD (PYUSD) is a USD-backed stablecoin issued by PayPal in partnership with Paxos Trust Company. It is fully backed by US dollar deposits, US Treasuries, and similar cash equivalents. PYUSD is available on Ethereum and Solana.
long_description: |
  PYUSD is issued by [PayPal](https://www.paypal.com/pyusd) in partnership with
  [Paxos Trust Company](https://paxos.com/) on Ethereum (launched August 2023) and Solana
  (launched May 2024).

  ## Mechanism

  - 100% backed by US dollar deposits, short-term US Treasuries, and cash equivalents
  - Custodied and issued by Paxos Trust Company on behalf of PayPal
  - 1:1 redeemable for USD via PayPal
  - ERC-20 on Ethereum with 6 decimal places; uses an upgradeable proxy pattern

  ## Status

  Active with approximately $4.1 billion market cap and 66,000+ holders on Ethereum as of
  early 2025. One of the largest fiat-backed stablecoins.

