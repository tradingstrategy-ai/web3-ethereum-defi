symbol: DOLA
name: Inverse Finance DOLA
short_description: |
  DOLA is a decentralised stablecoin issued by Inverse Finance on Ethereum. It is backed by
  various crypto collateral through the FiRM fixed-rate lending market. DOLA uses a Fed-style
  monetary policy with protocol-controlled supply expansion and contraction.
long_description: |
  [DOLA](https://www.inverse.finance/) is a decentralised USD-pegged stablecoin issued by [Inverse Finance](https://www.inverse.finance/).
  It is minted through [FiRM](https://www.inverse.finance/firm), Inverse Finance's fixed-rate lending market, where users deposit collateral to borrow DOLA at a fixed interest rate.

  Supply is managed via a Fed mechanism: the Inverse Finance DAO can expand or contract DOLA supply across whitelisted AMM pools and lending markets, analogous to a central bank's open market operations.
  DOLA can also be staked as sDOLA to earn yield from the protocol's revenues.

  Inverse Finance suffered two governance exploits in 2022 resulting in losses, but continued operating and compensating affected users over time.
