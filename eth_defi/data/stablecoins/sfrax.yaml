symbol: SFRAX
name: Staked FRAX
short_description: Staked FRAX (sFRAX) is an ERC-4626 yield-bearing token representing FRAX deposited in the Frax staking vault. It earns yield from T-bill and repo agreements distributed weekly. sFRAX is part of the Frax Finance ecosystem.
long_description: |
  sFRAX is the staking vault for [Frax Finance](https://frax.finance/)'s FRAX stablecoin. Users deposit FRAX into the sFRAX vault and receive sFRAX tokens that increase in value relative to FRAX over time as yield is distributed.

  Yield is distributed weekly in FRAX from Frax Protocol revenues, primarily from T-bill and repo agreement interest. sFRAX can always be withdrawn for FRAX at the pro-rata rate at any time.

  sFRAX is listed on [CoinGecko](https://www.coingecko.com/en/coins/staked-frax) and [DefiLlama](https://defillama.com/stablecoin/staked-frax).
