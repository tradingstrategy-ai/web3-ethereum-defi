symbol: sUSN
name: Noon Staked USN
short_description: sUSN is Noon's value-accruing token received when USN is staked. It represents a share of USN in Noon's staking pool.
long_description: |
  [Noon](https://docs.noon.capital/built-for-high-yields/our-stablecoin-usn-and-susn)
  issues sUSN when users stake USN, its dollar-pegged stablecoin. Each sUSN
  represents a share of the USN held in the staking pool. Noon says it directs a
  portion of returns from its strategies to that pool, which can increase the
  amount of USN represented by each sUSN token over time.

  sUSN can be unstaked for USN, subject to a cooldown period. Its value depends
  on the value of the pool's USN and on Noon's collateral, strategy, and
  operational arrangements.
