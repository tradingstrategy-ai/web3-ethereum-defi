short_description: Veno USD (VUSD) is a stablecoin issued by Veno Finance on Cronos zkEVM. It is part of the Veno liquid staking ecosystem known for LCRO, LATOM, and LETH tokens.
long_description: |
  VUSD is issued by [Veno Finance](https://veno.finance/) on [Cronos zkEVM](https://cronos.org/).
  Veno is primarily a liquid staking protocol (LCRO, LATOM, LETH), with VUSD as a secondary stablecoin product.

  ## Status

  Active but small — ~$3.2M market cap, ~570 active holders.
  Trading near the $1 peg.

  ## Sources

  - [CoinGecko — Veno USD](https://www.coingecko.com/en/coins/veno-usd)
  - [Veno Finance](https://veno.finance/)
