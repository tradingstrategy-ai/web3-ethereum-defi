short_description: |
  savUSD is the yield-bearing staked form of avUSD, issued by Avant Protocol on Avalanche.
  Users stake avUSD to receive savUSD, which appreciates in value as the protocol's
  delta-neutral DeFi strategies generate yield. savUSD represents a senior, lower-risk
  position protected by the junior avUSDx tranche.
long_description: |
  savUSD is issued by [Avant Protocol](https://www.avantprotocol.com/), a yield-generating
  DeFi platform built natively on [Avalanche](https://avax.network/). To acquire savUSD,
  users stake [avUSD](https://www.coingecko.com/en/coins/avant-usd) — Avant's USDC-backed
  stablecoin — on the protocol's native Avalanche deployment.

  ## Mechanism

  - savUSD accrues value through exchange-rate appreciation: as the protocol's strategies
    generate returns, the savUSD/avUSD exchange rate continuously increases
  - Yield comes from delta-neutral strategies managed by on-chain asset manager 0xPartners,
    deployed across multiple trading partners to reduce single-strategy concentration risk
  - savUSD sits at the top of the capital stack; losses are absorbed first by the junior
    avUSDx tranche before savUSD holders are affected
  - Redemption requires a 1-day cooldown; no yield accrues during this period
  - savUSD is available natively on Avalanche and bridged to Ethereum, Linea, Arbitrum,
    Berachain and Plasma via Chainlink CCIP

  ## Sources

  - [Avant Protocol documentation — core tokens](https://docs.avantprotocol.com/overview/core-tokens)
  - [CoinGecko: Avant Staked USD](https://www.coingecko.com/en/coins/avant-staked-usd)
