symbol: USDT0
name: Tether + LayerZero USDT0
short_description: USDT0 is an omnichain version of USDT powered by LayerZero's OFT standard. It enables native USDT transfers across multiple blockchains without traditional bridging. USDT0 is backed 1:1 by
  locked USDT.
long_description: |
  USDT0 is an omnichain version of Tether's USDT launched in January 2025, developed by Everdawn Labs in partnership with
  [LayerZero](https://layerzero.network/). It uses LayerZero's OFT (Omnichain Fungible Token) standard to enable
  native USDT transfers across blockchains without traditional bridging.

  ## Mechanism

  - USDT is locked on Ethereum; an equivalent amount of USDT0 is minted on the destination chain
  - 1 USDT0 = 1 USDT at all times
  - Supported chains include Arbitrum, Optimism, Base, and others

  ## Growth

  USDT0 surpassed $50 billion in cumulative transfers within 10 months of launch (by November 2025),
  with approximately $4.5 billion TVL on DeFiLlama.

