symbol: UTY
name: XSY.fi Unity
short_description: Unity (UTY) is a delta-neutral synthetic dollar launched by XSY.fi on the Avalanche blockchain. It maintains a USD peg by pairing long AVAX spot positions with short perpetual futures, generating yield for holders while preserving AVAX exposure.
long_description: |
  Unity (UTY) is the flagship product of [XSY.fi](https://xsy.fi/), a capital management platform on Avalanche.
  It is a composable, delta-neutral synthetic dollar: users gain USD-stable exposure while retaining AVAX collateral exposure.

  ## Mechanism

  - Long AVAX spot + short AVAX perpetual futures — delta-neutral position
  - Yield from funding rates and basis accrues to holders
  - Two vault derivatives: yUTY (auto-compounding yield) and xUTY (governance points)

  ## Funding

  XSY raised $5 million in a Pre-Series A round led by Protagonist and Borderless Capital, with participation from
  Blizzard the Avalanche Fund and other investors.

  ## Sources

