symbol: DJED
name: Djed
short_description: Djed is an overcollateralised stablecoin protocol on the Cardano blockchain. It uses a reserve coin (SHEN) to maintain its USD peg through an algorithmic mechanism. Djed was developed by IOG
  (Input Output Global) and deployed by COTI.
long_description: |
  [Djed](https://djed.xyz/) is a formally verified, overcollateralised stablecoin protocol originally built on the [Cardano](https://cardano.org/) blockchain.
  The protocol uses two tokens: DJED (the stablecoin) and SHEN (the reserve coin).
  SHEN holders absorb price volatility of the collateral asset (ADA) to keep DJED pegged to USD.
  The reserve ratio must remain between 400% and 800% for minting and burning to be permitted.

  Djed was designed by researchers at [IOG (Input Output Global)](https://iog.io/) and deployed in collaboration with [COTI](https://coti.io/) on Cardano mainnet in January 2023.
  It was one of the first major stablecoins on Cardano.
  A separate DJED token also exists on EVM-compatible chains tracked by DeFiLlama.
