symbol: tfUSDC
name: TrueFi USDC
short_description: tfUSDC represents USDC deposited into TrueFi's uncollateralised lending pools. TrueFi provides on-chain institutional lending to vetted borrowers, and tfUSDC earns yield from interest payments. It is a proportional ownership token for the TrueFi USDC pool.
long_description: |
  tfUSDC is issued by [TrueFi](https://truefi.io/), a protocol for on-chain uncollateralised lending to institutional borrowers. Users deposit USDC into TrueFi's lending pool and receive tfUSDC tokens representing their pro-rata share.

  TrueFi vets borrowers through a credit assessment process and disburses unsecured loans. Interest from borrowers accrues to tfUSDC holders. tfUSDC can be redeemed for the underlying USDC plus accrued interest, subject to pool liquidity.

  ## Status

  The tfUSDC pool is a legacy DAO pool that stopped active lending at the end of 2022 / start of 2023. It carries defaulted loans (including exposure to the Alameda bankruptcy). TrueFi has proposed transitioning the DAO to a new entity called Brila Finance (TFIP-41), and truefi.io now redirects to brila.finance. The tfUSDC pool remains on-chain but is not accepting new deposits.
