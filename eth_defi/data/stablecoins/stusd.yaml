symbol: STUSD
name: stUSD (Angle Protocol)
short_description: stUSD is the yield-bearing savings token for Angle Protocol's USDA stablecoin. Users deposit USDA to receive stUSD, which accrues yield continuously from Angle's borrowing module and reserve assets. stUSD is redeemable for an ever-growing amount of USDA at any time.
long_description: |
  stUSD (also called Angle Staked USDA) is issued by [Angle Protocol](https://www.angle.money/) as the savings layer for USDA, Angle's USD-pegged stablecoin. Yield comes from interest paid by USDA borrowers and from yield-bearing reserve assets.

  The value of 1 stUSD is not $1 — it increases over time as yield accrues. There are no deposit or withdrawal fees and no lock-up period. stUSD is available on Ethereum, Arbitrum, Optimism, and Base.

  stUSD is listed on [CoinGecko](https://www.coingecko.com/en/coins/angle-staked-usda).

  ## Status

  In early 2026, Angle Protocol tokenholder governance voted unanimously to wind down both USDA and EURA. The official announcement was made on 4 March 2026. Both stablecoins remain fully collateralised and redeemable 1:1 (USDA → USDC, EURA → EURC) on Ethereum until 1 March 2027. After that date, remaining reserves will be airdropped pro-rata to unredeemed holders. New minting is halted and the protocol is in wind-down mode. The team is now focused on developing the [Merkl](https://merkl.xyz/) DeFi incentives platform.
