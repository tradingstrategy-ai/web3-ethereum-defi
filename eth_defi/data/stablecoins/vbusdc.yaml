symbol: vbUSDC
name: Vault Bridge Bridged USDC (Katana)
short_description: vbUSDC is a bridged version of USDC on the Katana DeFi L2 via Vault Bridge. Katana is a DeFi-focused ZK-rollup incubated by Polygon Labs and GSR. Bridged assets are deployed into yield-generating strategies on Ethereum while in transit.
long_description: |
  vbUSDC is the VaultBridge representation of USDC on the [Katana](https://katana.network/)
  DeFi L2, which uses [AggLayer](https://agglayer.dev/) as its canonical bridge.

  When USDC is bridged to Katana via VaultBridge, the underlying USDC on Ethereum is
  deployed into low-risk yield-generating Morpho vaults, creating "productive TVL" that
  generates revenue for the network. Katana went live on public mainnet in June 2025.

  For more information, see the [Katana chain page](https://tradingstrategy.ai/trading-view/vaults/chains/katana).
