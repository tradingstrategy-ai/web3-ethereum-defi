symbol: bvUSD
name: BitVault USD
short_description: BitVault USD (bvUSD) is an overcollateralised CDP stablecoin by BitVault, a Liquity V2 fork on the Katana chain. It is backed by WBTC and WETH collateral with institutional-only bulk minting.
long_description: |
  bvUSD is issued by [BitVault](https://bitvault.finance/), a [Liquity V2](https://www.liquity.org/) fork
  deployed primarily on [Katana](https://katana.network/), a DeFi-focused chain incubated by Polygon Labs and GSR.

  ## Mechanism

  - Overcollateralised CDP model backed by WBTC and WETH
  - Initial LTV of 40%, up to 75% thereafter
  - Only whitelisted institutional borrowers can mint bvUSD in bulk; retail users mint via other stablecoins
  - Stability Pool absorbs liquidations (same architecture as Liquity)
  - Contracts are immutable once deployed

  ## Yield

  sbvUSD is the staked/yield-bearing version of bvUSD, where yield comes from delta-neutral
  institutional trading strategies (arbitrage, market-making) executed by [GSR](https://www.gsr.io/).

  ## Status

  Early-stage, launched on Katana on 19 June 2025. Raised $2M pre-seed from GSR, Gemini, and Auros.
  Not independently tracked on DeFiLlama or CoinGecko.

