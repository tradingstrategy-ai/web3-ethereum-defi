long_description: |
  [USD1](https://worldlibertyfinancial.com/usd1) is a fiat-backed stablecoin issued by
  [World Liberty Financial (WLFI)](https://worldlibertyfinancial.com/), a DeFi project
  associated with the Trump family. USD1 was announced in March 2025 and rapidly grew to
  over $3 billion in circulating supply by the end of 2025, placing it among the largest
  dollar-backed stablecoins behind USDT, USDC, and PYUSD.

  ## Mechanism

  USD1 maintains a 1:1 peg with the US dollar through full reserve backing. Each token is
  collateralised by a combination of short-term US Treasury bills, US government money
  market funds, and other cash equivalents held by custodians. Users can mint and redeem
  USD1 at $1, with arbitrage enforcing the peg. BitGo provides custody and
  attestation services. USD1 is deployed on Ethereum and BNB Smart Chain.

  ## Key properties

  - 100% reserve-backed by US Treasuries and cash equivalents
  - Custodied and attested by BitGo
  - Governance token: WLFI (100 billion max supply)
  - Deployed on Ethereum and BNB Smart Chain
  - World Liberty Financial has applied for a bank charter to evolve USD1's regulatory status

