short_description: deUSD is a decentralised synthetic dollar by Elixir Protocol. It uses institutional-grade market making and delta-neutral strategies. Elixir focuses on providing deep liquidity across orderbook
  exchanges.
long_description: |
  [deUSD](https://www.elixir.xyz/) is a synthetic dollar stablecoin issued by [Elixir Protocol](https://www.elixir.xyz/), a modular DeFi liquidity network focused on institutional order-book exchanges.
  It maintains its peg through delta-neutral strategies that combine spot collateral with short perpetual positions, similar to the design pioneered by Ethena's USDe.

  deUSD is backed by staked ETH (stETH) and other yield-bearing assets, with the yield distributed to holders of the staked version, sdeUSD.
  Elixir routes liquidity to centralised and decentralised order-book venues including dYdX, Vertex, and Hyperliquid.
