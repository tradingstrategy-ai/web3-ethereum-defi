symbol: pathUSD
name: pathUSD
short_description: |
  pathUSD is a USD-denominated stablecoin on Tempo. It is the first stablecoin
  deployed on the chain and serves as the default quote token for Tempo's
  stablecoin exchange and as a fallback gas token.
long_description: |
  [pathUSD](https://tempo.xyz/developers/docs/protocol/exchange/quote-tokens/) is
  a USD-denominated stablecoin on the Tempo blockchain. Tempo documents pathUSD
  as the first stablecoin deployed to the chain, an optional quote token for the
  native stablecoin exchange, and the fallback gas token when a user or validator
  does not specify another gas token.

  ## Mechanism

  pathUSD is issued by Bridge and backed 1:1 by high-quality USD-denominated
  reserves. Tempo states that pathUSD can be minted by depositing USDC.e and
  redeemed back to USDC through Bridge. The token is not intended to compete as a
  consumer-facing stablecoin; it is neutral infrastructure for routing between
  USD stablecoins on Tempo.

  ## Key properties

  - Predeployed TIP-20 stablecoin on Tempo mainnet
  - USD-denominated, 6 decimals, with contract currency `USD`
  - Root quote token for Tempo's stablecoin exchange
  - Fallback gas token when no other fee asset is selected

