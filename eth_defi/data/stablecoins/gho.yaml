symbol: GHO
name: GHO (Aave)
short_description: GHO is a decentralised multi-collateral stablecoin native to the Aave Protocol. It is overcollateralised by assets deposited in Aave V3 markets. GHO introduces facilitators that can trustlessly
  mint and burn the stablecoin within approved parameters.
long_description: |
  GHO is a native decentralised stablecoin of the [Aave Protocol](https://aave.com/), launched on Ethereum mainnet in July 2023.
  Unlike traditional stablecoins, GHO is minted by facilitators — entities approved by Aave governance that can mint and burn
  GHO within defined capacity limits. The primary facilitator is the Aave V3 Ethereum market, where users borrow GHO against
  their supplied collateral. Interest accrued on GHO borrows is directed to the Aave DAO treasury.

  GHO has since been bridged to Arbitrum and Base, expanding its utility across multiple chains.
