symbol: LUSD
name: Liquity USD
short_description: Liquity USD (LUSD) is a decentralised stablecoin issued by the Liquity Protocol on Ethereum. It is overcollateralised by ETH with a minimum collateral ratio of 110% and is fully redeemable
  for ETH. LUSD is governance-free and immutable, with no admin keys.
long_description: |
  LUSD is the stablecoin of [Liquity Protocol](https://www.liquity.org/), a decentralised borrowing
  protocol on Ethereum. Users open "Troves" by depositing ETH as collateral and minting LUSD at 0%
  interest, paying only a one-time borrowing fee. The minimum collateral ratio is 110%, enforced by
  immediate redemptions and liquidations.

  ## Key properties

  - Fully redeemable for ETH at face value at any time by any holder
  - Governance-free and immutable — no admin keys, no parameter changes
  - Backed solely by ETH (no other collateral types)
  - A Stability Pool of LUSD acts as the first line of defence for liquidations

  ## Status

  Active on Ethereum mainnet with approximately 30 million LUSD in circulation (as of early 2025).
  Liquity V2 (BOLD stablecoin) was also launched, but LUSD V1 remains operational and unrestricted.

  ## Sources

  - [Liquity Protocol](https://www.liquity.org/)
  - [Etherscan — LUSD](https://etherscan.io/token/0x5f98805A4E8be255a32880FDeC7F6728C6568bA0)
