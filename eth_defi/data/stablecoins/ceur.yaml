symbol: CEUR
name: Mento Euro (formerly Celo Euro)
short_description: cEUR (now Mento Euro) is a Euro-pegged stablecoin native to the Celo blockchain, issued by the Mento Protocol (formerly the Celo Reserve). It is backed by a diversified on-chain reserve
  and designed for mobile-first payments and cross-border transactions.
long_description: |
  cEUR was originally the Euro stablecoin of the [Celo](https://celo.org/) blockchain, issued and
  managed by the Celo Reserve. Following the separation of Mento Protocol from Celo in 2023, the stablecoin
  is now maintained by [Mento](https://mento.org/) as part of its multi-currency on-chain FX platform.

  ## Mechanism

  - Overcollateralised by a diversified on-chain reserve managed by Mento Protocol
  - Reserve contains CELO, BTC, ETH, USDC, and other assets
  - Minted and burned through Mento's on-chain exchange at oracle-determined EUR/USD rates
  - Natively issued on Celo; CoinGecko now lists it as "Mento Euro"

  ## Sources

  - [Mento Protocol documentation](https://docs.mento.org/)
  - [DeFiLlama: Celo Euro](https://defillama.com/stablecoin/celo-euro)
