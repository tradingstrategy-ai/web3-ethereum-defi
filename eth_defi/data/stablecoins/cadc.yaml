symbol: CADC
name: PayTrie CADC
short_description: CADC is a Canadian Dollar-backed stablecoin on Ethereum, pegged 1:1 to CAD. It is fully collateralised with Canadian dollars held in a bank account in Canada, issued by PayTrie AB Inc.
  CADC enables digital transactions denominated in Canadian dollars on multiple EVM chains.
long_description: |
  CADC (CAD Coin) is issued by [PayTrie AB Inc.](https://paytrie.com/), a Canadian fintech company. Each token
  is fully backed by Canadian dollars held in a regulated Canadian bank account. The token uses a proxy/upgradeable
  contract architecture.

  ## Mechanism

  - Fiat-backed: 1 CADC = 1 CAD, redeemable via the PayTrie platform
  - Deployed on Ethereum (primary), Linea, Base, Arbitrum, and Polygon
  - Proxy contract for upgradeability

