short_description: ynUSDx is a yield-bearing USD token from YieldNest Finance. It aggregates stablecoin yield from diversified DeFi strategies. YieldNest provides optimised yield across multiple protocols.
long_description: |
  ynUSDx (ynUSD Max) is a yield-bearing ERC-4626 stablecoin vault from
  [YieldNest Finance](https://www.yieldnest.finance/). It is their "MAX" vault product,
  designed to deliver optimised, risk-adjusted yield from stablecoins by aggregating
  top-tier DeFi and RWA strategies — including lending markets, liquidity provision,
  and yield farming.

  ## Mechanism

  ynUSDx is built on Ethereum L1 and targets APYs of 4–15%+ with automatic compounding
  and dynamic capital allocation across strategies. It follows the ERC-4626 tokenised
  vault standard.

