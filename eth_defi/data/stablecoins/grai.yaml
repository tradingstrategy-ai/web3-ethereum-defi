symbol: GRAI
name: Gravita GRAI
short_description: |
  GRAI is a USD-pegged stablecoin issued by Gravita Protocol, a Liquity fork on Ethereum. It is
  overcollateralised by liquid staking tokens (wstETH, rETH, cbETH) with interest-free borrowing
  at up to 90% LTV. Borrowers pay a one-time fee amortised over six months.
long_description: |
  GRAI is the native stablecoin of [Gravita Protocol](https://www.gravitaprotocol.com/), a fork of Liquity
  deployed on Ethereum. Users borrow GRAI against liquid staking tokens such as wstETH, rETH, weETH, sfrxETH,
  and osETH, with a maximum loan-to-value of 90%. Unlike Liquity's perpetual 0.5% interest, Gravita charges
  a one-time borrowing fee of up to 0.5% that is amortised over six months — effectively making borrowing free
  if the position is held long enough. Gravita is also deployed on Arbitrum, Linea, and other L2 networks.
  GRAI has experienced significant depegging events due to its relatively low supply and thin liquidity.
