- name: Reservoir rUSD
  short_description: Reservoir rUSD is a decentralised, scalable, yield-bearing stablecoin by Reservoir Protocol on Ethereum. The protocol also offers srUSD (liquid yielding) and trUSD (term-based yielding) variants backed by multiple digital and real-world assets.
  long_description: |
    [Reservoir Protocol](https://www.reservoir.xyz/) issues rUSD as "the next-gen stablecoin"
    backed by multiple digital and real-world assets. The protocol provides a full ecosystem
