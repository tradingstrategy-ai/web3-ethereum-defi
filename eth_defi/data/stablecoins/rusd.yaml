- name: f(x) rUSD
  short_description: f(x) rUSD is a stablecoin issued by f(x) Protocol on Ethereum, built on Aladdin DAO. It uses the f(x) mechanism where LST-backed collateral is split into a low-volatility stable token (rUSD) and a leveraged long position.
  long_description: |
    [f(x) Protocol](https://fx.aladdin.club/) issues rUSD as a low-volatility synthetic dollar
    backed by liquid staking derivatives. The protocol uses a mathematical invariant to split
    collateral (wstETH, WBTC) into a stable token (rUSD/fxUSD) and a leveraged perpetual
    (xPOSITION). The protocol has completed 16 security audits including OpenZeppelin.

    Contract address on Ethereum: `0x65d72aa8da931f047169112fcf34f52dbaae7d18`
    (103,956 rUSD, 142 holders as of early 2025)
