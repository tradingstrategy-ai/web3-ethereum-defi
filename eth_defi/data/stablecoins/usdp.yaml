symbol: USDP
name: Paxos Dollar
short_description: Pax Dollar (USDP) is a USD-backed stablecoin issued by Paxos Trust Company. It is fully backed by cash and cash equivalents and regulated by the New York State Department of Financial Services.
  USDP was formerly known as Paxos Standard (PAX).
long_description: |
  Pax Dollar (USDP) is issued by [Paxos Trust Company](https://paxos.com/), LLC, a regulated financial institution supervised by the New York State Department of Financial Services (NYDFS).
  Reserves are held 100% in cash and cash equivalents, ensuring 1:1 redeemability.

  ## History

  USDP was originally launched in September 2018 as Paxos Standard (PAX). It was rebranded to Pax Dollar (USDP) in 2021.
  Paxos also issues PYUSD (PayPal USD) and USDG (Global Dollar) under separate partnerships.

