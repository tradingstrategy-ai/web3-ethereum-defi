- name: DefiDollar
  short_description: DefiDollar (DUSD) was a meta-stablecoin that indexed multiple stablecoins to reduce risk. It combined USDC, DAI, USDT, and sUSD into a single index token. The project is no longer actively
    maintained.
  long_description: |
    [DefiDollar](https://dusd.finance/) was a meta-stablecoin protocol that pooled multiple USD-pegged stablecoins (USDC, DAI, USDT, sUSD) to create a single index token with diversified stablecoin risk.
    By holding DUSD, users gained exposure to a basket of stablecoins without concentrating risk in any single issuer.
    The protocol is no longer actively maintained and is considered defunct.
  links:
    homepage: https://dusd.finance/
    coingecko: https://www.coingecko.com/en/coins/defidollar
