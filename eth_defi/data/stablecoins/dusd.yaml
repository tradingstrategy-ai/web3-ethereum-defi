entries:
- name: StandX DUSD
  short_description: DUSD by StandX is a yield-bearing stablecoin backed by market-neutral, delta-hedged assets. It earns yield from staking rewards and futures funding fees. DUSD is primarily deployed on BNB Smart Chain.
  long_description: |
    [StandX DUSD](https://standx.com/) is a yield-bearing synthetic dollar issued by [StandX](https://standx.com/), a perpetual futures DEX.
    It is backed by market-neutral assets (e.g., ETH, SOL) that are delta-hedged with short perpetual positions to eliminate directional risk.
    Yield from staking rewards and futures funding fees is distributed to DUSD holders automatically without staking.
    DUSD is primarily deployed on BNB Smart Chain and tracked on [DefiLlama](https://defillama.com/stablecoin/standx-dusd).
  links:
