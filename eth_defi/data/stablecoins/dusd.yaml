- name: DefiDollar
  short_description: DefiDollar (DUSD) was a meta-stablecoin that indexed multiple stablecoins to reduce risk. It combined USDC, DAI, USDT, and sUSD into a single index token. The project is no longer actively
    maintained.
  long_description: |
    [DefiDollar](https://dusd.finance/) was a meta-stablecoin protocol that pooled multiple USD-pegged stablecoins (USDC, DAI, USDT, sUSD) to create a single index token with diversified stablecoin risk. By holding DUSD, users gained exposure to a basket of stablecoins without concentrating risk in any single issuer. The project was funded with $1.2 million from investors including Standard Crypto and Accomplice, and was built by the team at Yield Studio. It originated from the ETHGlobal HackMoney hackathon.

    The protocol used Curve Finance LP tokens as collateral to maintain the DUSD peg. Arbitrage mechanics kept the price near $1: minting DUSD when trading above $1 and burning it when below $1. The protocol also supported a BSC deployment backed by Nerve Finance.

    The DefiDollar team halted active development around 2021–2022 and pivoted to building Hubble Exchange on Solana. DUSD reached its all-time high of $1.59 in June 2021, and has traded well below its peg since the project was abandoned. The DUSD token has been marked as inactive by major data providers.

