long_description: |
  [JPYC](https://jpyc.jp/) is a Japanese Yen-pegged stablecoin issued by
  [JPYC Inc.](https://jpyc.jp/), a Japanese company. It is designed to bring the
  Japanese Yen on-chain, enabling payments, remittances, and DeFi use cases within
  the Japanese crypto ecosystem and beyond.

  ## Mechanism

  JPYC is issued as a prepaid payment instrument under Japan's Funds Settlement Act,
  which provides a regulatory framework for its operation. Each JPYC represents one
  Japanese Yen and is redeemable for prepaid services or exchangeable through authorised
  channels. The token is available on multiple blockchains including Ethereum, Polygon,
  Avalanche, Gnosis Chain, and Shiden Network.

  ## Key properties

  - Fiat-backed 1:1 with JPY
  - Regulated as prepaid payment instrument in Japan
  - Multi-chain deployment (Ethereum, Polygon, Avalanche, Gnosis Chain)
  - Targeted at Japanese retail and institutional users for digital payments

