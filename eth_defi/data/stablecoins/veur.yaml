symbol: VEUR
name: VNX Euro
short_description: VNX Euro (VEUR) is a Euro-backed stablecoin issued by VNX, a Liechtenstein-regulated fintech. Each VEUR is backed 1:1 by Euro reserves. VEUR enables regulated Euro-denominated digital transactions.
long_description: |
  VNX Euro is issued by [VNX](https://vnx.li/), a token generator licensed under
  Liechtenstein's Blockchain Act and registered with the FMA. Each VEUR is backed 1:1
  by Euro reserves, with monthly attestation reports published for transparency.

  ## Chains

  VEUR is deployed on Ethereum, Arbitrum, Base, Solana, and other networks. It is the
  #1 Euro stablecoin by supply on the Solana network (as of 2025).

