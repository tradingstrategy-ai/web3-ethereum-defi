short_description: |
  apyUSD is the yield-bearing savings token of the Apyx protocol, an ERC-4626 vault that wraps apxUSD — Apyx's dividend-backed synthetic dollar. Depositors receive apyUSD shares whose exchange rate against apxUSD increases continuously as dividends from Digital Asset Treasury preferred shares (such as Strategy's STRC) are streamed on-chain.
long_description: |
  apyUSD is issued by [Apyx](https://apyx.fi/), the first Dividend-Backed Stablecoin (DBS) protocol. The protocol transforms variable-rate perpetual preferred equity issued by Digital Asset Treasury (DAT) companies into programmable on-chain yield.

  The two-token design separates liquidity from yield:

  - **apxUSD** is the base synthetic dollar — an over-collateralised, non-rebasing stablecoin redeemable in USDC, designed for deep secondary-market liquidity.
  - **apyUSD** is the savings layer — a non-rebasing ERC-4626 vault whose exchange rate against apxUSD rises over time as accumulated dividends are streamed into the vault.

  Collateral backing consists of a diversified basket of variable-rate perpetual preferred shares from DAT companies (Strategy STRC, Strive SATA) supplemented by cash and short-duration US Treasuries. Apyx publishes monthly third-party attestations prepared by Wolf & Company, P.C., a PCAOB-registered audit firm.

  apyUSD launched on Ethereum mainnet in February 2026 and is also deployed on Base. It is listed on [CoinGecko](https://www.coingecko.com/en/coins/apyusd) and tracked on [DefiLlama](https://defillama.com/rwa/asset/apyusd).
