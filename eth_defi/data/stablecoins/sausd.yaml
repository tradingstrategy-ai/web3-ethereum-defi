symbol: sAUSD
name: Savings AUSD (Agora)
short_description: sAUSD is the yield-bearing savings token for AUSD, the digital dollar stablecoin issued by Agora Finance. Users deposit AUSD and receive sAUSD, which accrues yield from AUSD's underlying T-bill backing. sAUSD can be redeemed instantly at any time.
long_description: |
  [Agora Finance](https://www.agora.finance/) issues AUSD as a 1:1 USD-backed digital dollar, with reserves composed of cash, overnight repurchase agreements, and short-term US Treasury securities managed by a major custodian bank and audited by a Big 4 firm.

  sAUSD (Savings AUSD) is the first savings product built on AUSD, powered by [Upshift](https://app.upshift.finance/) infrastructure. Users deposit AUSD into a savings vault and receive sAUSD tokens, which accumulate yield from AUSD's T-bill backing. Redemption is instant with no lock-up period.

  AUSD and sAUSD are available on Ethereum, Avalanche, Sui, and Monad. sAUSD is tracked on [CoinMarketCap](https://coinmarketcap.com/currencies/earn-ausd/).
