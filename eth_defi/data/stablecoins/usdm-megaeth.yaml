symbol: USDm
name: MegaUSD
short_description: USDm (MegaUSD) is the native stablecoin of the MegaETH blockchain, designed for high-throughput DeFi applications on the MegaETH real-time EVM chain.
long_description: |
  [USDm (MegaUSD)](https://www.megaeth.com/) is the native stablecoin of the
  [MegaETH](https://www.megaeth.com/) blockchain. MegaETH is a high-performance
  EVM-compatible chain targeting real-time block production (~1 second blocks).

  USDm uses 18 decimals and serves as the primary denomination token for DeFi
  vaults and lending protocols deployed on MegaETH, including Morpho and
  Gains Network.
