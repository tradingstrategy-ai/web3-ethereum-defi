symbol: USR
name: Resolv USR
short_description: USR is a stablecoin issued by Resolv, a delta-neutral stablecoin protocol. It is backed by ETH and hedged with short perpetual futures positions to maintain its peg. USR generates yield from
  funding rates and staking rewards.
long_description: |
  USR is a yield-bearing stablecoin issued by [Resolv Labs](https://resolv.xyz/), backed 1:1 by ETH.
  Resolv maintains the peg using a delta-neutral strategy: for every USR in circulation, Resolv holds
  long ETH collateral hedged by an equivalent short perpetual futures position.

  ## Yield

  The yield from ETH staking rewards and perpetual funding rates is passed on to holders.
  USR can be wrapped into rlUSR to receive the yield directly.

  ## Insurance pool

  Resolv operates an insurance pool (RLP — Resolv Liquidity Pool) that absorbs collateral shortfalls
  caused by adverse funding rates, protecting USR holders.

  ## Contract address

