long_description: |
  Tokenised GBP (tGBP) is a fiat-backed stablecoin issued by [BCP Technologies](https://www.tokenisedgbp.com/), a UK
  FCA-registered cryptoasset firm. Launched in 2025, it is positioned as the first live GBP-denominated stablecoin from a
  regulated UK issuer. Each tGBP is redeemable 1:1 for British Pounds and is fully backed by cash and short-dated UK
  government securities (such as zero-coupon gilts).

  tGBP is deployed natively across multiple EVM chains — Ethereum, Base, Polygon, BNB Chain and Avalanche — sharing the
  same token contract address, and is also available on Solana. The issuer is a member of the Digital Pound Foundation.
