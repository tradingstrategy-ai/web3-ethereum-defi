symbol: XSTUSD
name: SORA Synthetic USD
short_description: XSTUSD is a synthetic USD stablecoin on the SORA network. It is designed for the SORA decentralised economic system. XSTUSD uses a token bonding curve mechanism for price stability.
long_description: |
  XSTUSD is a synthetic USD stablecoin native to the [SORA](https://sora.org/) blockchain,
  a Substrate-based decentralised economic system. It is backed by XST (the SORA Synthetic
  base asset), which is itself backed by a variable amount of XOR (the SORA native token).

  ## Mechanism

  XSTUSD uses a token bonding curve (TBC) model rather than an oracle-based price feed.
  The TBC provides price stability by algorithmically managing buy and sell prices.
  XSTUSD exists natively on the SORA network and also has a bridged representation on
  Ethereum (ERC-20).

  ## Status

  Largely inactive. The Ethereum-bridged token trades at well below $1 with virtually
  zero volume (~$5/day). Proceeds with caution.

