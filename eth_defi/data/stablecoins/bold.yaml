symbol: BOLD
name: Liquity BOLD
short_description: BOLD is the USD-pegged stablecoin issued by Liquity V2, fully decentralised and overcollateralised by ETH and liquid staking tokens. It has a minimum collateral ratio of 110%, is always
  redeemable for $1 of collateral, and is immutable with no governance.
long_description: |
  BOLD is the native stablecoin of [Liquity V2](https://www.liquity.org/), launched in 2024. It is the
  successor to LUSD and maintains the same core principles of full decentralisation and immutability.
  BOLD is rated A- by Bluechip, making it one of the highest-rated decentralised stablecoins.

  ## Mechanism

  - Overcollateralised CDP model: backed exclusively by WETH, wstETH, and rETH
  - Minimum collateral ratio: 110% (no stability fee; instead users set their own interest rate)
  - Always redeemable at face value: 1 BOLD = $1 of collateral
  - No governance: protocol is immutable and fully on-chain
  - 100% of protocol revenue distributed to BOLD stakers and liquidity providers
  - Stability Pool absorbs liquidations

  ## Sources

  - [Liquity V2 documentation](https://docs.liquity.org/)
  - [Etherscan: BOLD on Ethereum](https://etherscan.io/token/0x6440f144b7e50D6a8439336510312d2F54beB01D)
  - [DeFiLlama: Liquity BOLD](https://defillama.com/stablecoin/liquity-bold)
