- name: Stables Labs USDX
  short_description: USDX is a delta-neutral synthetic dollar by Stables Labs. It uses hedged positions across DeFi, CeFi, and TradFi venues to maintain its USD peg. Stables Labs raised $45M at a $275M valuation in 2024.
  long_description: |
    ## Status

    On November 7, 2025, USDX suffered a 64% depeg to approximately $0.35 following a security exploit
    in a Balancer V2 pool that drained $1 million from the USDX/sUSDX liquidity pool. Stables Labs
    published a recovery plan, but the token continued to decline, reaching an all-time low of $0.009
    on March 13, 2026. The homepage (usdx.money) was unreachable as of March 2026. USDX is considered defunct.
