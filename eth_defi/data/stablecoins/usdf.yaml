- name: Falcon USD
  short_description: Falcon USD is a stablecoin issued by Falcon Finance, a protocol focused on delta-neutral strategies. It aims to provide stable value through hedged positions. Falcon Finance is built for
    institutional and DeFi use cases.
  long_description: |
    USDf is an overcollateralised synthetic dollar issued by [Falcon Finance](https://falcon.finance/),
    a Universal Collateral Infrastructure protocol designed for both institutional and DeFi users.
    USDf is minted by depositing collateral assets and is maintained at a $1 peg through a combination
    of delta-neutral and market-neutral strategies.

    ## Mechanism

    Stablecoin deposits mint USDf at a 1:1 ratio. Non-stablecoin and real-world asset (RWA) deposits
    use a dynamic Overcollateralisation Ratio (OCR) calibrated to the asset's volatility, liquidity,
    and historical behaviour — ensuring the total collateral value always exceeds USDf in circulation.

    Deposited collateral is actively managed to achieve delta neutrality: Falcon neutralises directional
    price exposure by holding spot assets while shorting perpetual futures (funding-rate arbitrage), or
    by selling spot and going long futures in negative-rate environments. This means USDf holders are
    insulated from collateral price movements.

    Yield is distributed to holders who stake USDf into sUSDf, a yield-bearing token that compounds
    returns from the delta-neutral strategies and RWA income. Falcon also maintains a $10 million
    insurance fund and audits its segregated reserves weekly.

    ## Key properties

    - Overcollateralised synthetic dollar; dynamic OCR for volatile assets
    - Delta-neutral collateral management via funding-rate arbitrage
    - sUSDf: yield-bearing staking token backed by protocol strategies
    - $10M insurance fund; weekly reserve audits
    - Institutional focus with DeFi accessibility

