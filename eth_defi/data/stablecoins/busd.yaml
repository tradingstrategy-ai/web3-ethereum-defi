symbol: BUSD
name: Binance USD
short_description: Binance USD (BUSD) was a USD-pegged stablecoin issued by Paxos Trust Company in partnership with Binance, regulated by the New York State Department of Financial Services. Paxos ceased minting
  new BUSD in February 2023 following a NYDFS order, and support ended by February 2024.
long_description: |
  BUSD was issued by [Paxos Trust Company](https://paxos.com/) in partnership with [Binance](https://www.binance.com/)
  as a fully regulated, USD-backed stablecoin. At its peak it was one of the largest stablecoins by market cap.

  ## History

  - Launched September 2019 on Ethereum
  - Also available on BNB Chain as a wrapped/bridged version
  - February 2023: The New York State Department of Financial Services ordered Paxos to stop minting BUSD
  - February 2024: Binance and Paxos ceased all support; users were urged to convert BUSD to other stablecoins
  - Effectively **defunct** — redeem any remaining BUSD via Paxos before December 2024

