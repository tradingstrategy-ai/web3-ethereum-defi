symbol: USH
name: unshETH
short_description: USH is the governance and incentive token of unshETH, a protocol for diversified Ethereum liquid staking. unshETH allows users to hold a basket of LSDs (liquid staking derivatives) in a single vault, promoting validator decentralisation across Ethereum.
long_description: |
  USH is the native token of [unshETH](https://unsheth.xyz/), an on-chain movement to incentivise Ethereum
  validator diversity. The protocol issues unshETH tokens backed by a diversified basket of liquid staking
  derivatives (LSDs) from providers such as Lido, Rocket Pool, and others.

  ## Purpose

  USH is used for governance and as an incentive mechanism (validator decentralisation mining / vdMining) to
  encourage liquidity providers. It is not itself a stablecoin.

  ## Note

  USH trading volume is low as of early 2026, but the protocol documentation remains active.

