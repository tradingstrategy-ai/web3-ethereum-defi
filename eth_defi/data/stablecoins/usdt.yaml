long_description: |
  Tether (USDT) is the largest stablecoin and the most traded cryptocurrency by volume.
  It is issued by [Tether Limited](https://tether.to/) and backed by reserves including US Treasury Bills,
  cash, cash equivalents, and other short-term assets.

  ## Key deployments

  USDT is deployed natively on many chains. The most significant contract addresses are:

  - Ethereum (ERC-20): `0xdAC17F958D2ee523a2206206994597C13D831ec7`
  - Tron (TRC-20): `TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t`

  ## Sources

  - [Tether.to](https://tether.to/)
  - [DeFiLlama — Tether](https://defillama.com/stablecoin/tether)
