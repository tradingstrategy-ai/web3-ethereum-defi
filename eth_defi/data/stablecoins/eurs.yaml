long_description: |
  [EURS](https://stasis.net/) is a Euro-backed stablecoin issued by [STASIS](https://stasis.net/), a Malta-based digital asset company (STSS Malta Limited).
  It is one of the oldest and largest Euro stablecoins, having launched in 2018.
  Each EURS is fully backed by Euros held in reserve and attested by regular third-party audits.

  EURS is an ERC-20 token on Ethereum and is also available on other EVM-compatible networks.
  It is targeted at institutional and retail users seeking Euro-denominated digital asset exposure.
  STASIS provides transparency reports and redemption services directly to verified users.
