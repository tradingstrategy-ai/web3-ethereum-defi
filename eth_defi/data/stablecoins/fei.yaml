name: Fei USD
description: Fei USD was a decentralised stablecoin that used protocol-controlled value (PCV) to maintain its peg. It was governed by the Tribe DAO and backed by ETH and other assets in the protocol's treasury.
  The project shut down in 2023 and returned funds to holders.
