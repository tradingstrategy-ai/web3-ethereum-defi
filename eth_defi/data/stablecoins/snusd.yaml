symbol: sNUSD
name: Neutrl Staked NUSD
slug: snusd
category: yield_bearing
short_description: |
  sNUSD is the yield-bearing staking token for Neutrl's NUSD synthetic dollar. Users stake NUSD to receive sNUSD, which passively accrues all net revenue generated by Neutrl's delta-neutral OTC arbitrage and funding rate strategies without any manual reinvestment required.
long_description: |
  sNUSD is issued by [Neutrl](https://neutrl.fi/), a DeFi protocol on Ethereum that operates a market-neutral synthetic dollar. Holders of NUSD can stake their tokens to receive sNUSD, an ERC-4626 yield-bearing vault share that appreciates in value as the protocol earns yield.

  ## Mechanism

  Neutrl deploys capital across liquid delta-neutral strategies: funding rate arbitrage, OTC altcoin deal flow at discounts hedged via perpetual futures, and stablecoin lending. The resulting protocol revenue accrues to sNUSD holders proportionally, with sNUSD automatically appreciating in USD terms. No manual claiming or reinvestment is required.

  Approximately 65% of NUSD supply is staked as sNUSD (143M sNUSD / $148M as of June 2026), with a 7-day average APY of approximately 9%.

  ## Key contracts (Ethereum)

  - NUSD: `0xE556ABa6fe6036275Ec1f87eda296BE72C811BCE`
  - sNUSD: `0x08EFCC2F3e61185D0EA7F8830B3FEc9Bfa2EE313`

  ## Cross-chain

  Neutrl has integrated LayerZero's OFT standard, enabling NUSD and sNUSD to be transferred across multiple EVM chains.

