short_description: Vesta Stable (VST) was a decentralised stablecoin issued by Vesta Finance on Arbitrum. It was overcollateralised by ETH, GLP, and other assets. Vesta Finance has been deprecated.
long_description: |
  Vesta Stable (VST) was issued by [Vesta Finance](https://vestafinance.xyz/) on Arbitrum.
  It was an overcollateralised stablecoin where users could deposit ETH, GLP, and
  other assets to borrow VST at 0% interest, similar to Liquity's model.

  ## Status

  Deprecated. Vesta Finance shut down operations in 2024. VST still exists on-chain
  but the protocol no longer supports new borrowing or collateral operations.

  ## Sources

  - [DefiLlama — Vesta Stable](https://defillama.com/stablecoin/vesta-stable)
  - [CoinGecko — Vesta Stable](https://www.coingecko.com/en/coins/vesta-stable)

  The original domain vestafinance.xyz has been taken over by an unrelated gambling site as of 2026.
