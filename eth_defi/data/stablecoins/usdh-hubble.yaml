symbol: USDH
name: Hubble USDH
short_description: |
  USDH was a stablecoin issued by Hubble Protocol on Solana. It was overcollateralised by various
  crypto assets including SOL, BTC, and ETH. The project has been deprecated.
long_description: |
  [USDH](https://hubbleprotocol.io/) was a censorship-resistant, crypto-backed stablecoin issued by [Hubble Protocol](https://hubbleprotocol.io/) on the Solana blockchain. It was soft-pegged to the US dollar and fully collateralised by a basket of Solana ecosystem assets — including SOL, mSOL, stSOL, ETH, and RAY — deposited into Hubble's smart contracts. Hubble raised $5 million in September 2022 to expand the protocol.

  ## Mechanism

  Users borrowed USDH by depositing accepted collateral into Hubble's vaults above the minimum collateral ratio. Each USDH in circulation was backed by more than $1 of collateral. Liquidations were handled automatically to maintain solvency. The protocol also supported kTokens (Kamino liquidity positions) as collateral.

  ## Status

  Hubble Protocol has been deprecated and USDH is no longer in production use. The original DefiDollar team, which had also worked on Solana-based products, separately pivoted to build Hubble Exchange, a Solana perpetuals DEX.

