symbol: ALUSD
name: Alchemix USD
short_description: Alchemix USD (alUSD) is a synthetic stablecoin issued by the Alchemix protocol on Ethereum. It is backed by yield-bearing assets and allows users to take self-repaying loans against their deposits.
  The protocol automatically repays debt using the yield generated from deposited collateral.
long_description: |
  alUSD is a synthetic stablecoin created by depositing yield-bearing assets (such as yvDAI or aDAI) into
  [Alchemix](https://alchemix.fi/). The protocol issues alUSD at up to 50% of the deposited collateral value,
  and the loan is repaid over time using the yield generated by the collateral — meaning users never need to
  actively repay their debt.

  ## Mechanism

  - Fully backed by yield-bearing collateral (DAI-based vaults, USDC, USDT)
  - Self-repaying loans: yield from collateral gradually reduces debt to zero
  - alUSD is soft-pegged to $1 and can always be redeemed from the transmuter
  - No liquidations as long as collateral value exceeds debt

  ## Sources

  - [Alchemix documentation](https://alchemix-finance.gitbook.io/user-docs/)
