short_description: Utopia USD (UUSD) is a privacy-focused stablecoin within the Utopia P2P ecosystem, pegged 1:1 to the US Dollar and backed by DAI collateral. It is designed for anonymous, decentralised transactions and has largely ceased active trading.
long_description: |
  Utopia USD (UUSD) is a stablecoin issued by the [Utopia](https://u.is/) P2P ecosystem, a privacy-oriented
  communications and payments network. It is backed by DAI collateral and targets a 1:1 USD peg.

  ## Status

  UUSD trading has become largely inactive — as of early 2026, tokens had stopped trading on all listed exchanges
  for extended periods. The stablecoin may be considered dormant.

  ## Sources

  - [CoinGecko — Utopia USD](https://www.coingecko.com/en/coins/utopia-usd)
