long_description: |
  bbqUSDC (Smokehouse USDC) is a [MetaMorpho](https://morpho.org/) vault share token deployed and curated by [Steakhouse Financial](https://www.steakhouse.financial) on Ethereum mainnet. The token represents a proportional claim on USDC deposited into the vault.

  ## Mechanism

  The vault is built on [Morpho Blue](https://morpho.org/), a permissionless lending primitive. Steakhouse Financial, acting as curator, actively allocates the pooled USDC across multiple Morpho Blue lending markets — each backed by different collateral types — to capture the highest risk-adjusted yield available at any given time. Allocation decisions are made by the curator's automated allocator contracts and its on-chain risk framework.

  The "Smokehouse" branding reflects Steakhouse Financial's vault product line. The vanity address prefix `0xBEeFFF…` is consistent with the Steakhouse/Morpho vault deployment style.

  ## Key properties

  - ERC-4626 compliant receipt token; value appreciates as interest accrues
  - Underlying asset: USDC (USD Coin by Circle)
  - Curated by Steakhouse Financial on Morpho Blue
  - Auto-compounding: no manual claim required
  - Deployed on Ethereum mainnet

