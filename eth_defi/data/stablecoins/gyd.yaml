symbol: GYD
name: Gyroscope Dollar
short_description: Gyroscope Dollar (GYD) is a decentralised stablecoin designed with an all-weather reserve structure. It uses concentrated liquidity pools and a novel redemption mechanism to maintain its peg.
  GYD aims to be resilient against black swan events through diversified backing.
long_description: |
  [Gyroscope Dollar (GYD)](https://www.gyro.finance/) is a fully-backed decentralised stablecoin issued by
  the Gyroscope protocol. It targets a 1 USD peg and is designed to be resilient against the systemic
  risks that have caused other stablecoins to fail, including oracle failures, governance attacks, and
  collateral contagion.

  ## Mechanism

  GYD is backed by an "all-weather" reserve — a diversified portfolio of DeFi assets spread across
  segregated vaults, each representing a distinct risk dimension (censorship, regulatory, counterparty,
  oracle, and governance risk). If one vault is compromised, the failure is contained and does not
  cascade through the system.

  Minting and redemption are governed by autonomous pricing curves with dynamic fees and circuit
  breakers. When GYD trades above $1, users can mint at a slight premium; when it trades below, they
  can redeem from the reserve. This arbitrage mechanism keeps the peg tightly anchored.

  GYD liquidity is concentrated in Elliptic Concentrated Liquidity Pools (E-CLPs), a novel AMM
  primitive developed by Gyroscope and built on [Balancer](https://balancer.fi/). E-CLPs concentrate
  liquidity asymmetrically along an elliptical curve around the peg price, improving capital
  efficiency relative to constant-product or StableSwap designs.

  ## Key properties

  - Fully backed by a diversified, vault-segregated all-weather reserve
  - E-CLP AMM provides deep, capital-efficient peg liquidity on Balancer
  - sGYD: a yield-bearing ERC-4626 wrapper where deposited GYD earns reserve yield
  - GYFI governance token used for protocol parameter control and revenue distribution
  - Deployed on Ethereum mainnet (December 2023) and Arbitrum

