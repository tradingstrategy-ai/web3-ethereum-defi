symbol: cUSDT
name: Compound USDT
short_description: cUSDT is the Compound protocol's interest-bearing token representing USDT supplied to Compound V2. It accrues interest automatically as borrowers pay interest on USDT loans. cUSDT enables passive
  yield on Tether holdings.
long_description: |
  cUSDT is an [ERC-20](https://ethereum.org/en/developers/docs/standards/tokens/erc-20/) token issued by [Compound Finance](https://compound.finance/) when users deposit USDT into Compound V2.
  The exchange rate of cUSDT to USDT increases over time as interest accrues from borrowers.
  Holders do not need to take any action — yield accumulates automatically in the token's exchange rate.

  Compound V2 is a non-custodial, algorithmic money market protocol on Ethereum.
  Interest rates are set algorithmically based on supply and demand within each market.
  cUSDT can be redeemed for USDT at any time, subject to available liquidity in the protocol.
