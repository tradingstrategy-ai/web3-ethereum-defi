symbol: RAI
name: Rai (Reflexer)
short_description: RAI is a non-pegged, ETH-backed stable asset issued by Reflexer Labs on Ethereum. It uses a PID controller (redemption rate mechanism) to dampen price volatility rather than targeting a fixed dollar peg. RAI is backed solely by ETH and is governance-minimised.
long_description: |
  RAI is issued by [Reflexer Finance](https://reflexer.finance/) on Ethereum. Unlike most
  stablecoins, RAI does not target a fixed $1 peg. Instead, it uses an on-chain PID controller
  called the "Rate Setter" (or "Money God") that adjusts the redemption rate to push the market
  price towards the redemption price over time.

  ## Mechanism

  - Backed solely by ETH — no other collateral types
  - Users open SAFEs (analogous to Maker Vaults) to mint RAI
  - The redemption rate can be positive or negative, creating incentives to mint or burn RAI
  - Starting redemption price was ~$3.14 (pi), not $1.00
  - Governance-minimised: Reflexer aims for "ungovernance" with minimal human intervention

  ## Status

  Reflexer Finance entered Global Settlement in Q1 2025. RAI became redeemable at
  approximately 0.0011267 ETH per RAI as of June 2025. The protocol's Twitter account
  last posted in June 2025 confirming redemption details. Reflexer V2 was announced
  as a future project. RAI V1 is effectively wound down — new minting is not expected
  and the on-chain settlement mechanism is active.

