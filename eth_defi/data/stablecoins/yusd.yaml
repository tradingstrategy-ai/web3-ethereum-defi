- name: YieldFi yUSD
  short_description: yUSD is a yield-bearing stablecoin from YieldFi, a DeFi yield aggregator. It allocates USDC deposits across blue-chip DeFi protocols including Pendle, Aave, Morpho, and Ethena to generate optimised yield. yUSD is deployed on Ethereum, Arbitrum, and Base.
  long_description: |
    yUSD is issued by [YieldFi](https://yield.fi/), a multi-chain yield aggregator.
    It is backed by USDC and implements the ERC-4626 standard with a yield-vesting mechanism.
    YieldFi allocates across strategies including Pendle, Aave, Morpho, Silo, Midas,
    and Ethena, targeting 10–20% APY.

    As of 2025, yUSD is ranked in the top 1500 by market cap on CoinGecko with approximately
    $11M in circulating supply.
  links:
