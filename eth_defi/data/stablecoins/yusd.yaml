- name: YUSD (Yeti Finance)
  short_description: YUSD was a decentralised stablecoin issued by Yeti Finance on Avalanche. It was overcollateralised by yield-bearing assets including LP tokens and staked AVAX. Yeti Finance wound down in early 2024.
  long_description: |
    YUSD was issued by [Yeti Finance](https://yeti.finance/) on Avalanche. Users could
    borrow YUSD at 0% interest against a wide range of collateral types, including
    LP tokens and yield-bearing stablecoins, at up to 21x leverage. The protocol wound
    down in January–February 2024, with troves automatically repaid on 4 February 2024.
