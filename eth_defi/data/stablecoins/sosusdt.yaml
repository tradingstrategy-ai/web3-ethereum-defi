long_description: |
  sosUSDT is an unidentified token. The symbol pattern is consistent with a Sonne Finance (soUSDT) lending receipt token on Optimism — Sonne Finance is a Compound V2 fork on Optimism and Base that issues "so" prefixed receipt tokens when users deposit assets into its lending pools. However, no verified contract or documentation for a token using the exact symbol "sosUSDT" has been found.

  Sonne Finance was exploited for approximately $20 million in May 2024 via a known Compound V2 donation-attack vulnerability. Following the exploit, Sonne paused all markets on Optimism. The protocol's Base markets remained operational, but its Optimism deployment was effectively shut down.

  This entry is a placeholder pending definitive identification of the contract and issuer. If the token is later confirmed as a Sonne Finance or other protocol receipt token, the metadata should be updated accordingly.

