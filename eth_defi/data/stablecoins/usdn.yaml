- name: Neutrino USD
  short_description: Neutrino USD (USDN) was an algorithmic stablecoin on the Waves blockchain backed by WAVES. It depegged significantly in 2022 and was rebranded to XTN. The protocol is now largely inactive.
  long_description: |
    [Neutrino USD (USDN)](https://neutrino.at/) was an algorithmic stablecoin built on the
    [Waves](https://waves.tech/) blockchain, issued by the Neutrino Protocol. USDN was
    collateralised solely by WAVES tokens, using a mint-and-burn mechanism similar in
    design to Terra's UST. The protocol launched in 2019 and was operational until its
    effective collapse in 2022–2023.

    ## Collapse and rebranding

    USDN lost its peg four separate times in 2022 alone. The first major depeg occurred in
    April 2022 following bearish sentiment about WAVES, and a second crisis struck in May
    2022 as contagion from the Terra/LUNA collapse spread to algorithmic stablecoins.
    The token traded as low as $0.72 during these events. In February 2023, USDN was
    officially rebranded to **XTN (Neutrino Index Token)** following a community governance
    vote. XTN transitioned away from attempting a $1 peg to become a non-pegged index
    token backed by a diversified basket of assets.

    ## Status

    USDN/XTN is essentially defunct as a stablecoin. The market cap of the legacy USDN
    token had fallen to approximately $1.9 million by late 2025. The Neutrino Protocol
    site remains online but activity is negligible.

    ## Sources

    - [Neutrino Protocol — official site](https://neutrino.at/)
    - [CoinDesk — crisis in USDN spreads from Terra](https://www.coindesk.com/markets/2022/05/11/crisis-in-terras-ust-stablecoin-spreads-to-neutrino-usd-on-waves-protocol)
    - [X/Twitter — USDN → XTN rebranding announcement](https://x.com/neutrino_proto/status/1620374348057174017)
    - [CoinGecko — Neutrino Index Token (XTN)](https://www.coingecko.com/en/coins/neutrino-index-token)
