- name: Noble Dollar
  short_description: Noble Dollar (USDN) is a stablecoin native to the Noble blockchain in the Cosmos ecosystem. It is backed by US dollar reserves and designed for cross-chain IBC transfers. USDN is used across
    Cosmos-based chains.
  long_description: |
    [Noble Dollar (USDN)](https://noble.xyz/) is a yield-bearing stablecoin issued on the
    [Noble](https://noble.xyz/) appchain, a purpose-built stablecoin issuance chain in the
    Cosmos ecosystem. Noble Dollar is built on top of [M^0](https://www.m0.org/), a
    decentralised stablecoin infrastructure protocol on Ethereum that uses short-duration
    US Treasury Bills as collateral. Noble was the first chain to deploy a custom stablecoin
    using the M^0 "stablecoin extension engine."

    ## Mechanism

    Noble Dollar is backed 1:1 by short-duration US Treasury Bills held by M^0. Yield from
    the T-bill collateral is distributed to USDN holders, making it a native yield-bearing
    stablecoin. Noble leverages [IBC](https://www.ibcprotocol.dev/) packet-forwarding to
    route USDN seamlessly across all IBC-connected Cosmos chains. The underlying $M token
    from M^0 serves as the core building block, with Noble customising distribution and
    yield mechanics.

    ## Key properties

    - Yield-bearing: backed by short-duration US Treasury Bills
    - Fully IBC-native and transferable across Cosmos chains
    - Built on M^0 decentralised stablecoin infrastructure
    - Operates on the Noble appchain (not Ethereum)

    ## Sources

    - [Noble — official site](https://noble.xyz/)
    - [M^0 press release — USDN for Cosmos](https://www.m0.org/press-releases/m-0-strengthens-stablecoin-tools-partners-with-noble-to-introduce-usdn-for-cosmos-ecosystem)
    - [The Block — Noble first to launch via M^0](https://www.theblock.co/post/329332/cosmos-based-noble-first-to-launch-custom-stablecoin-using-cryptodollar-infrastructure-startup-m0)
