long_description: |
  [fxUSD](https://fx.aladdin.club/) is a USD-pegged stablecoin issued by the
  [f(x) Protocol](https://docs.aladdin.club/f-x-protocol), a DeFi primitive built by
  [Aladdin DAO](https://aladdin.club/) on Ethereum. Unlike conventional stablecoins, fxUSD
  is backed entirely by liquid staking tokens (LSTs) — primarily stETH and wBTC — using a
  split-tranche design where one tranche absorbs volatility and the other remains stable.

  ## Mechanism

  The protocol pairs each LST into two derivative tokens: a stable token (fxUSD, targeting
  $1) and a leveraged token (xPOSITION/sPOSITION in v2.1) that absorbs all price
  fluctuations of the underlying collateral. This invariant ensures fxUSD remains 100%
  backed while the leveraged counterpart provides capital efficiency. A decentralised
  stability pool (fxUSD + USDC) defends the peg, and yield from stETH staking, opening
  fees, and FXN token emissions is distributed to liquidity providers.

  ## Key properties

  - Backed by stETH and wBTC; no fiat or centralised custodians
  - 100% collateralisation maintained by the f(x) invariant
  - Yield distributed via the fxSAVE module for flexible savings
  - Deployed on Ethereum mainnet; governance by FXN token holders

