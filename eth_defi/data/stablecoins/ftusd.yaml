long_description: |
  [ftUSD](https://flyingtulip.com/ftusd/) is the native stablecoin of [Flying Tulip](https://flyingtulip.com/), a unified on-chain financial platform built on the [Sonic](https://soniclabs.com/) blockchain, created by [Andre Cronje](https://x.com/AndreCronjeTech).
  It is designed as a delta-neutral synthetic dollar that serves as the settlement currency across Flying Tulip's integrated suite of products: spot trading (AMM + CLOB), lending, perpetual futures, and insurance.

  ftUSD is non-yielding by default; users can stake it to sftUSD to earn yield from the protocol's delta-neutral strategies.
  Flying Tulip raised $200 million in a private seed round at a $1 billion fully diluted valuation in early 2025, and subsequently raised additional funds.
  The project held a public token sale on CoinList in February 2026.
