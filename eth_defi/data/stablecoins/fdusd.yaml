long_description: |
  [First Digital USD (FDUSD)](https://firstdigitallabs.com/) is a fiat-backed stablecoin issued by [First Digital Labs](https://firstdigitallabs.com/), a Hong Kong-based digital asset infrastructure company.
  Each FDUSD is fully backed by US dollars and short-term US Treasury bills held in segregated custodian accounts, with monthly attestations published.

  FDUSD was launched in 2023 and rapidly grew to become one of the most traded stablecoins, primarily through [Binance](https://www.binance.com/), which offers zero-fee trading pairs denominated in FDUSD.
  It is available on Ethereum and BNB Smart Chain (same contract address on both networks), as well as Sui, Solana, and Arbitrum.
