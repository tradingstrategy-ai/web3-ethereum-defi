long_description: |
  [feUSD](https://www.usefelix.xyz/) is a collateralised debt position (CDP) stablecoin issued by [Felix Protocol](https://www.usefelix.xyz/), the first major lending protocol on [HyperEVM](https://hyperliquid.xyz/) (Hyperliquid's EVM-compatible layer).
  Felix is a friendly fork of Liquity V2, enabling users to borrow feUSD against crypto collateral at interest rates determined by governance.

  Felix launched in early 2025 and quickly became the dominant native stablecoin protocol on HyperEVM, with over $150 million in TVL.
  It has integrations with Morpho and Ethena, and feUSD is used for yield strategies across the Hyperliquid ecosystem.
  Felix announced plans to evolve feUSD towards a broader stablecoin called HUSD.
