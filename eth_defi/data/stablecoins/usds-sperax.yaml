long_description: |
  Sperax USD (USDs) is an auto-yield stablecoin on [Arbitrum](https://arbitrum.io/), deployed by
  [Sperax](https://sperax.io/). It maintains a $1 peg and automatically accrues yield from underlying
  DeFi strategies — holders receive yield simply by holding the token, without any staking required.

  ## Mechanism

  - Backed by USDC and yield-generating DeFi strategies on Arbitrum
  - Uses an automated yield strategy to generate returns passively
  - The yield is distributed by rebasing or auto-compounding the holder's balance

