symbol: sfrxUSD
name: Staked Frax USD
short_description: sfrxUSD is an ERC-4626 yield-bearing token representing frxUSD deposited in the Frax staking vault. It targets a benchmark-rate strategy alternating between carry-trade, AMO, and T-bill strategies. sfrxUSD is redeemable for frxUSD at any time with no fees.
long_description: |
  sfrxUSD is issued by [Frax Finance](https://frax.finance/) as the yielding stablecoin for frxUSD. frxUSD is a fiat-redeemable, fully collateralised stablecoin backed 1:1 by permitted cash-equivalent reserves such as tokenised US Treasury funds.

  The Benchmark Yield Strategy (BYS) allocates all frxUSD staked in sfrxUSD to the top yield venue under current market conditions — carry-trade strategies, DeFi AMO strategies, or RWA strategies holding short-dated US Treasury bills. The strategy rotates automatically to maximise yield.

  sfrxUSD does not rebase; it increases in value relative to frxUSD over time. It can be redeemed for frxUSD at any time with no unstaking fee or price impact. sfrxUSD is listed on [CoinGecko](https://www.coingecko.com/en/coins/staked-frax-usd).
