symbol: plUSD
name: Trevee Plasma USD
short_description: Trevee Plasma USD (plUSD) is a meta-stablecoin backed 1:1 by USDT on the Plasma L1 chain. Deposits are deployed into Aave and Fluid for yield. Previously known as Rings Protocol.
long_description: |
  plUSD is issued by [Trevee](https://trevee.com/) (previously known as Rings Protocol)
  on the [Plasma](https://plasma.network/) L1 blockchain, a chain purpose-built for stablecoins.

  ## Mechanism

  - Backed 1:1 by USDT — users deposit USDT to mint plUSD
  - Deposits are deployed into [Aave](https://aave.com/) and [Fluid](https://fluid.instadapp.io/) for yield
  - splUSD (Staked Plasma USD) is the yield-bearing version that auto-compounds returns
  - [Midas RWA](https://midas.app/) provides the vault infrastructure

  **This is NOT a Liquity fork** — it is a USDT-backed meta-stablecoin.

  ## Status

  Effectively dead — CoinGecko shows ~$8.4M market cap but trading stopped ~2 months ago.
  DeFiLlama shows Trevee Earn TVL collapsed from ~$54M peak (Sept 2024) to ~$950.

