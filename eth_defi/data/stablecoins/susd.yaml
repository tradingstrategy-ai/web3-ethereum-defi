symbol: SUSD
name: Synthetix sUSD
short_description: sUSD is the native stablecoin of the Synthetix protocol, pegged to the US Dollar. It is backed by SNX tokens staked by participants in the Synthetix system. sUSD is used as the base trading asset for Synthetix's synthetic assets.
long_description: |
  sUSD is the base synthetic asset of the [Synthetix](https://synthetix.io/) protocol. It is minted by SNX stakers as a debt against their staked collateral and serves as the base currency for trading other synths on Synthetix Exchange.

  sUSD is available on Ethereum mainnet and Optimism. On Optimism, Synthetix deprecated legacy synths in early 2026 as part of its transition to Synthetix V3 and Perps V3, where sUSD retains a role as a margin/settlement currency.

  sUSD is listed on [CoinGecko](https://www.coingecko.com/en/coins/susd) and [DefiLlama](https://defillama.com/stablecoin/susd).
