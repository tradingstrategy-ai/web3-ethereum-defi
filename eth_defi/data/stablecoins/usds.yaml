long_description: |
  USDS (Sky Dollar) is the successor to [DAI](https://makerdao.com/), issued by the [Sky](https://sky.money/) protocol
  (formerly MakerDAO) following a major rebrand in 2024. It is backed by diversified crypto collateral and real-world assets,
  and maintains a 1:1 USD peg.

  ## Conversion

  Existing DAI can be upgraded 1:1 to USDS via the Sky upgrade module. The conversion is reversible.

  ## Yield

  Holders can deposit USDS into the Sky Savings Rate (sUSDS) to earn yield.

  ## Contract addresses

  - Ethereum: `0xdC035D45d973E3EC169d2276DDab16f1e407384F`

  ## Sources

  - [Sky.money](https://sky.money/)
  - [DeFiLlama — USDS](https://defillama.com/stablecoin/usds)
