long_description: |
  [EUROC](https://www.circle.com/eurc) (now rebranded to EURC) is a Euro-backed stablecoin issued by [Circle](https://www.circle.com/), the company behind USDC.
  Each token is fully backed 1:1 by Euros held in reserve at regulated financial institutions.

  Circle announced the rebrand from EUROC to EURC in 2023.
  The underlying contract address on Ethereum did not change — only the name and symbol were updated on existing contracts.
  EURC is available on Ethereum, Base, Avalanche, Solana, and other networks.
  It is Circle's Euro-denominated equivalent of USDC.
