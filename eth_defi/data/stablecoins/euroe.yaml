long_description: |
  [EUROe](https://www.euroe.com/) is a Euro-backed stablecoin issued by [Membrane Finance](https://www.membrane.fi/), a Finnish fintech company licensed as an electronic money institution (EMI) under EU regulation.
  It was one of the first EU-regulated Euro stablecoins, launched in February 2023.

  EUROe is fully backed 1:1 by Euro deposits held in European bank accounts and is supervised by the Finnish Financial Supervisory Authority (Finanssivalvonta).
  It is collateralised at 102% as a buffer.
  EUROe is available on Ethereum, Polygon, Arbitrum, and Avalanche.
  Membrane Finance also introduced bridged EUROe to improve cross-chain liquidity.

  ## Status

  EUROe is defunct. In early 2025, Membrane Finance was acquired by [Paxos](https://paxos.com/), which completed the acquisition on 4 February 2025.
  On 8 May 2025, the Paxos Issuance Europe team announced the wind-down of EUROe operations.
  Minting of new EUROe stopped on 31 May 2025.
  The EUROe Account portal closed on 31 July 2025, the final date for direct redemptions.
  Paxos redirected European stablecoin efforts to its USDG (Global Dollar) product.
