long_description: |
  USX is the decentralised stablecoin of [dForce](https://dforce.network/), a DeFi matrix protocol providing
  stablecoin, lending, and yield infrastructure. It is minted via overcollateralised loans in the dForce lending
  protocol and is deployed across multiple chains including Ethereum, Arbitrum, Optimism, and BNB Chain.

