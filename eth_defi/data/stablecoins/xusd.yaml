- name: StraitsX USD
  short_description: XUSD is a USD-backed stablecoin issued by StraitsX, a licensed payment institution in Singapore. Each XUSD is backed 1:1 by USD reserves. It enables digital transactions denominated in US
    dollars on blockchain.
  long_description: |
    StraitsX XUSD is issued by [StraitsX](https://www.straitsx.com/), a regulated payment
    institution in Singapore. The stablecoin contract was first deployed on Ethereum in
    February 2024, leveraging the same security architecture as StraitsX's XSGD product
    (previously audited by Quantstamp). XUSD is fully backed by USD reserves with monthly
    attestation reports published.

    XUSD is available on Ethereum and BNB Smart Chain, with Solana deployment planned for 2026.
    It trades on major centralised exchanges (Binance, Bybit, MEXC) and DEXs (Uniswap, PancakeSwap).
