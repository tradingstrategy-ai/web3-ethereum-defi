- name: xDollar
  short_description: xDollar (xUSD) was a multi-chain overcollateralised stablecoin protocol inspired by MakerDAO. It allowed minting xUSD stablecoins against various collateral types. The project has been largely abandoned.
  long_description: |
    xDollar was a multi-chain overcollateralised stablecoin protocol inspired by MakerDAO,
    primarily deployed on the [XDC Network](https://xdc.org/) and Polygon.
    Users could deposit XDC tokens as collateral to mint xUSD stablecoins, targeting a
    1:1 peg to the US Dollar. The protocol was governed by Fathom DAO.

    ## Mechanism

    - Overcollateralised model: users lock XDC (and other accepted collateral) to mint xUSD
    - Collateral ratio enforced on-chain; positions subject to liquidation below minimum ratio
    - Inspired by MakerDAO's CDP (Collateralised Debt Position) architecture
    - Deployed on XDC Network (primary) and Polygon

    ## Status

    The project has been largely abandoned. Circulating supply fell to effectively zero and
    the official website (`xdollar.fi`) returns a certificate error as of 2026. On-chain
    contract data on Polygonscan shows ~3.55 million xUSD total supply with no active market.

    ## Sources

    - [CoinMarketCap — xUSD](https://coinmarketcap.com/currencies/xdollar-stablecoin/)
