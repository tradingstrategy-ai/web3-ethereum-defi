name: OpenEden
slug: openeden
short_description: |
  Tokenised U.S. Treasury bill fund for eligible professional investors.
long_description: |
  OpenEden's TBILL product tokenises exposure to a fund that holds short-dated U.S. Treasury bills. The token is designed to provide onchain settlement and a value that follows the fund's net asset value.

  Access to TBILL is restricted to eligible investors and subscriptions or redemptions can require prior approval. Availability varies by jurisdiction.
fee_description: |
  The product page publishes the applicable transaction fee and expense ratio. Investors should also review the offering and onboarding documents for any costs that apply to their account.
