name: Maseer One
slug: maseer-one
short_description: |
  Compliance-gated tokenised real-world assets with on-chain NAV/share.
long_description: |
  Maseer One is a modular tokenisation framework for real-world assets. Each
  deployment issues an ERC-20 token while connecting immutable references to a
  purchase token, price oracle, market gate, issuer registry, compliance guard
  and output conduit. The initial integration tracks Wren Staked tGBP (wstGBP)
  on Ethereum.

  Maseer One assets are not ERC-4626 vaults. The token exposes its purchase and
  redemption asset through `gem()` and a WAD-scaled NAV/share through
  `navprice()`. Minting and redemption use bespoke, compliance-gated methods,
  but the adapter can calculate historical TVL as token supply multiplied by
  NAV/share in the real ERC-20 denomination.
fee_description: |
  Maseer One applies its mint and redemption fees by adjusting the on-chain
  NAV/share. `mintcost()` is the price paid by minters and `burncost()` is the
  price paid to redeemers. The adapter derives these externalised fee fractions
  from the current values relative to `navprice()`.
