name: Maseer One
slug: maseer-one
short_description: |
  Compliance-gated tokenised real-world assets with transparent pricing.
long_description: |
  Maseer One is a modular tokenisation framework for real-world assets. Each
  product gives eligible holders access to a tokenised asset with transparent
  value information. The initial integration tracks Wren Staked tGBP (wstGBP)
  on Ethereum.

  Minting and redemption are subject to compliance and eligibility checks.
  Holders should review the product documentation and redemption terms before
  investing.
fee_description: |
  Maseer One applies a spread when assets are minted or redeemed. Fees may vary
  with the current product terms; consult the official mint and redeem guidance
  before investing.
