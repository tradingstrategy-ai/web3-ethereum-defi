name: Aera
slug: aera
short_description: |
  Non-custodial vault infrastructure for onchain treasury management and yield strategies.
long_description: |
  Aera powers onchain vaults with offchain intelligence. Vault owners configure
  assets, protocol allowlists, guardians, and hooks so strategy execution can be
  optimised offchain while remaining constrained and enforced onchain.

  Aera V3 exposes a common BaseVault security model and two audited vault
  implementations: SingleDepositorVault for treasury management use cases and
  MultiDepositorVault for yield vaults where multiple depositors receive receipt
  tokens representing their units in the vault.

  Key features:

  - Guardian-based operation execution with owner-approved constraints
  - Whitelist and hook checks for protocol interactions and calldata
  - Modular vault design for treasury management, earn programmes, and multi-depositor strategies
  - Public contract snapshots and documentation
fee_description: |
  Fee information is vault-specific. Current ERC-4626 AeraStrategy wrappers
  expose a Yearn TokenizedStrategy performance fee in basis points and point to
  an underlying Aera V2 vault. The Aera V2 vault exposes a per-second TVL fee
  in 18-decimal fixed point format; this maps to an annual management fee in
  the vault analytics pipeline. Newer Aera V3 FeeVault deployments use fee
  calculator contracts with TVL and performance fee settings.
