name: Circle USYC
slug: circle-usyc
short_description: |
  Permissioned tokenised money market fund offering short-term U.S. government securities exposure.
long_description: |
  Circle USYC represents shares in the Hashnote International Short Duration Yield Fund Ltd. The fund invests in U.S. Treasury bills and reverse repurchase agreements backed by short-term U.S. government securities.

  USYC is intended for eligible institutional users and requires onboarding. Its token value reflects the fund's net asset value rather than staking rewards or rebasing.
fee_description: |
  Circle publishes subscription and redemption fees, with a zero-fee tier for eligible combined daily volume up to the documented threshold. The fund also has a performance fee on yield; these costs affect the fund's net asset value.
