name: Gauntlet
slug: gauntlet
short_description: |
  Risk-managed DeFi yield vaults powered by Aera onchain infrastructure.
long_description: |
  Gauntlet is a DeFi-native quantitative research firm specialising in risk management,
  incentive optimisation, and vault curation. Founded in 2018, Gauntlet manages over $1B
  in vault TVL across 80+ vaults on Ethereum, Base, Arbitrum, and Optimism.

  Gauntlet uses Aera's onchain vault infrastructure with two contract types:

  - **VaultV2** (Aera V2): Adapter-based architecture for multi-protocol yield allocation,
    with granular cap systems, timelocked governance, and performance/management fees.
  - **MultiDepositorVault** (Aera V3): Guardian-based architecture with provisioner pattern
    for cross-chain yield strategies like Gauntlet USD Alpha (gtUSDa).

  Vault strategies include Prime (conservative lending), Balanced (moderate risk),
  Frontier (maximum yield), and Earn (cross-protocol, cross-chain yield).
fee_description: |
  Gauntlet vaults may charge management fees (up to 5% per year on AUM) and performance
  fees (up to 50% on yield generated). Fee parameters are stored on-chain and can be read
  via the `managementFee()` and `performanceFee()` functions. Many Gauntlet vaults
  currently have 0% fees.
