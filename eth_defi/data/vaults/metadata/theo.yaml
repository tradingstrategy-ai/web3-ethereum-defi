name: Theo
slug: theo
short_description: |
  Tokenised financial products including a KYC-restricted basket of U.S. Treasury bills.
long_description: |
  Theo issues tokenised financial products intended to make real-world assets more accessible on public
  blockchain networks. This integration covers thBILL, a basket of institutional-grade tokenised U.S.
  Treasury bills held through Theo's iToken product structure.

  Direct thBILL minting and redemption are available only to participants who complete Theo's KYC process.
  Redemptions are settled in USDC under the product's servicing terms, while the public token can also be
  traded through supported third-party venues. Eligibility, settlement timing and liquidity constraints may
  affect an investor's ability to subscribe or redeem.
fee_description: |
  Theo's public thBILL documentation describes the product composition and direct dealing eligibility, but
  does not publish a universal management, performance, subscription or redemption fee schedule. Holders
  should obtain current product terms from Theo before transacting; this integration does not infer fees
  from token supply or basket composition.
