name: Accountable
slug: accountable
short_description: |
  Blockchain-based financial verification technology with ERC-7540 async redemption vaults.
long_description: |
  YieldApp by Accountable is the first yield marketplace built on top of Accountable's
  Data Verification Network. Every opportunity from borrower vaults to structured credit
  strategies is backed by live, cryptographically verifiable data. Designed for allocators,
  YieldApp makes it easy to discover, assess, and deploy into yield opportunities you can
  trust.

fee_description: |
  Fee information is not publicly exposed on-chain. Accountable vaults do not have
  explicit fee getter functions available for reading management or performance fees.
