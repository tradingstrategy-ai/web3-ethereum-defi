name: Bulla Network
slug: bulla-network
short_description: |
  Permissioned stablecoin liquidity pools for financing trade invoices and loans.
long_description: |
  [Bulla Network](https://www.bulla.network/) helps finance trade invoices and
  loan offers. Its pools bring together stablecoin liquidity from participants
  and businesses seeking financing against amounts they expect to receive.

  Access to a pool may be restricted. Withdrawals can also be delayed if cash
  is committed to outstanding financing or other participants are ahead in the
  withdrawal queue. Returns depend on borrowers paying the financed invoices,
  so participants remain exposed to credit, collection, liquidity and
  underwriter-selection risk.

  Bulla publishes [audit reports](https://github.com/bulla-network/factoring-contracts/tree/main/audits).
  Audits are useful security evidence, but do not remove the risk that a
  borrower does not pay or that a pool cannot meet a withdrawal promptly.
fee_description: |
  Fees can include a Bulla protocol charge, a pool administrator charge and an
  underwriter spread. They vary by pool and financing arrangement, so there is
  no single all-in fee that applies to every Bulla pool. Review the selected
  pool's terms and current fees before participating.
