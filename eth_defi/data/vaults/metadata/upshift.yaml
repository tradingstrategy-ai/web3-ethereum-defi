name: Upshift
slug: upshift
short_description: |
  Institutional onchain asset-management infrastructure for custom vault products.
long_description: |
  Upshift is infrastructure for institutional onchain asset management. Teams use Upshift
  to design, launch, integrate and distribute custom vault products for DeFi Earn, PayFi,
  real-world assets and other yield strategies.

  Upshift vaults run on August infrastructure. August provides prime-brokerage services,
  policy-controlled smart contract accounts, risk controls and cross-margining for vault
  strategy execution. The vault contracts remain non-custodial structures where depositors
  receive vault receipt tokens and can verify positions onchain.

  Trading Strategy supports both observed Upshift vault families. Older TokenizedAccount vaults
  expose the usual ERC-4626 accounting surface directly on the vault contract. Newer multi-asset
  vaults, including RockawayX curated Tori Ecosystem Vault and Earn ctUSD, expose vault accounting
  through Upshift-specific read methods and use a separate LP token returned by `lpTokenAddress()`
  for share metadata and supply.

  Multi-asset Upshift vault discovery uses Upshift's custom `Deposit(address,uint256,uint256,address,address)`
  event together with the verified implementation ABI, because deposits are emitted at the proxy
  address while the public proxy ABI only exposes proxy administration events.
