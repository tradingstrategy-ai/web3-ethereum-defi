name: Frax
slug: frax
short_description: |
  Decentralised stablecoin protocol with lending markets and stablecoin savings products.
long_description: |
  Frax provides stablecoin products, lending markets, liquid staking derivatives and related decentralised finance services. Its Fraxlend markets allow users to lend to isolated borrowing pairs, while its savings products distribute protocol yield through token redemption value.

  The risks and terms differ by product, collateral type and market. Users should review the relevant application documentation before depositing.
fee_description: |
  Fraxlend markets set their own protocol share of borrower interest, which is internalised by minting shares to the protocol. Savings products can have different terms, and the underlying strategies may have their own operating costs.
