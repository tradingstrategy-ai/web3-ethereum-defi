name: 3Jane
slug: 3jane
short_description: |
  Decentralised credit-based money market issuing the USD3 and sUSD3 stablecoin tranche vaults.
long_description: |
  3Jane is a decentralised, credit-based money market on Ethereum that facilitates
  uncollateralised stablecoin lending. Depositors supply USDC and receive the protocol's
  ERC-4626 vault tokens — USD3 (the senior tranche) or, by staking USD3, sUSD3 (the junior
  tranche). The pooled capital is lent across two credit sleeves: uncollateralised USDC credit
  lines to crypto-native borrowers and funding conduits to U.S. fintech lenders.

  Yield is internalised in the share price: USD3 appreciates against USDC as interest accrues,
  while sUSD3 captures a higher proportion of pool yield in exchange for absorbing losses first
  in the senior/junior waterfall. As the protocol operates its own vaults, 3Jane acts as their
  curator.
fee_description: |
  Yield is distributed through share-price appreciation rather than explicit deposit or
  withdrawal fees. Both tranches take a fixed proportion of whatever the backing generates,
  with sUSD3 (junior) receiving a larger share in return for first-loss risk. Exact fee
  parameters are not published as on-chain accessors.
