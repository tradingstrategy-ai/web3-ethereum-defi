name: 3Jane
slug: 3jane
short_description: |
  Decentralised credit-based money market issuing the USD3 and sUSD3 stablecoin tranche vaults.
long_description: |
  3Jane is a decentralised, credit-based money market on Ethereum that facilitates
  uncollateralised stablecoin lending. Depositors supply USDC and receive the protocol's
  ERC-4626 vault tokens — USD3 (the senior tranche) or, by staking USD3, sUSD3 (the junior
  tranche). The pooled capital is lent across two credit sleeves: uncollateralised USDC credit
  lines to crypto-native borrowers and funding conduits to U.S. fintech lenders.

  Yield is internalised in the share price: USD3 appreciates against USDC as interest accrues,
  while sUSD3 captures a higher proportion of pool yield in exchange for absorbing losses first
  in the senior/junior waterfall. As the protocol operates its own vaults, 3Jane acts as their
  curator.
fee_description: |
  3Jane charges no explicit management, deposit, withdrawal or redemption fee — USD3 and
  sUSD3 redemptions are documented as "No fee", and suppliers earn the net pool interest,
  distributed through share-price appreciation. The vaults are Yearn V3 TokenizedStrategy
  contracts, and the senior/junior split is implemented via the strategy's on-chain
  performanceFee() (basis points out of 10000): USD3 (senior) reads 1000 = 10%, whose
  performanceFeeRecipient is the sUSD3 vault itself — i.e. the TRANCHE_SHARE_VARIANT
  waterfall routing senior yield to the junior tranche, not a 3Jane protocol fee. sUSD3
  (junior) reads 0; in Phase 1 it receives 100% of net interest in return for first-loss
  risk, and carries a one-month lock before redemption via a cooldown window.
  See https://docs.3jane.xyz/usd3-susd3/suppliers and https://docs.3jane.xyz/resources/faq.

  Note: no management-fee percentage is published (no accessor, no docs figure); the
  performance fee is read live from the on-chain performanceFee() rather than assumed.
