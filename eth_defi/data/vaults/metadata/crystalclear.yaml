name: CrystalClear
slug: crystalclear
short_description: |
  Algorithmic trading vaults on Hyperliquid's HyperEVM that trade perpetual futures on HyperCore.
long_description: |
  CrystalClear builds ERC-4626 vaults on HyperEVM that run quantitative trading
  strategies across Hyperliquid perpetual futures markets. Each vault targets a
  distinct risk-return profile — diversified, momentum-tilted, high-conviction,
  or low-turnover — trading long and short across multiple crypto assets.

  Strategies are rebalanced every two weeks: the live roster is replaced with a
  freshly evolved cohort that has been out-of-sample validated before going live.
  Vaults use a UUPS proxy pattern with OpenZeppelin v5 and share a single
  implementation contract.

  Key features:

  - ERC-4626 with 9 share decimals and USDC denomination
  - Two-step withdrawal via requestWithdraw() then claimWithdraw()
  - 1-hour deposit lock for MEV protection
  - Per-vault TVL caps via maxTVL()
  - Vault equity held on HyperCore; totalAssets() reflects full account value
fee_description: |
  20% performance fee charged at redemption (externalised). No management fee.
  Performance fee is deducted from withdrawal proceeds.
