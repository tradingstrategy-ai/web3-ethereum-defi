name: Frax
slug: frax-finance
short_description: |
  Decentralised stablecoin protocol with lending markets and stablecoin savings vaults.
long_description: |
  Frax Finance is a decentralised finance protocol that originated as the first fractional-algorithmic
  stablecoin. The protocol has evolved into a comprehensive DeFi ecosystem encompassing stablecoins
  (FRAX/frxUSD), liquid staking derivatives (frxETH/sfrxETH), lending markets (Fraxlend),
  an automated market maker (Fraxswap), and its own Layer 2 chain (Fraxtal).

  Fraxlend is the lending component of Frax Finance, providing isolated lending pairs where lenders
  deposit assets and earn variable interest from borrowers. Each pair has its own collateral type,
  interest rate model, and risk parameters. Frax also offers sFRAX and sfrxUSD savings products, where
  deposited stablecoins earn yield distributed by the protocol and remain redeemable without a time lock.
  The protocol uses Algorithmic Market Operations (AMOs) to perform autonomous market operations and
  maintain stablecoin pegs.

  With Frax v3, the protocol moved to 100% collateralisation, removing dependence on USDC.
  Governance is handled through Frax Shares (FXS) and a vetokenomics model (veFXS).
fee_description: |
  Each Fraxlend pair sets its own protocol share of interest revenue, so the percentage can vary between markets
  and change over time. Fraxlend internalises this fee by minting shares to the protocol, diluting lenders as interest
  accrues; it is not charged directly on deposit or withdrawal.
  Lenders receive the net yield after the protocol fee is deducted from borrower interest.

  The reviewed sFRAX and sfrxUSD staking vaults do not charge explicit management, performance, deposit
  or withdrawal fees. Their yield is distributed through an increasing redemption value. The underlying
  protocol strategies may themselves earn returns net of their own operating costs.
