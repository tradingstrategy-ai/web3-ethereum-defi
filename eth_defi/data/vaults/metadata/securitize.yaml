name: Securitize
slug: securitize
short_description: |
  Tokenisation platform for real-world assets, with permissioned on-chain securities infrastructure.
long_description: |
  Securitize helps investment firms bring traditional financial products, such as funds and
  private-market investments, into digital form. It provides the services needed to create,
  manage and make these products available to eligible investors.

  Securitize works with asset managers, wealth advisers and investors. Its platform can support
  many investment products. BlackRock USD Institutional Digital Liquidity Fund (BUIDL) is the
  first Securitize product tracked by this integration, but it is only one example of the funds
  and securities that can use Securitize's services.
fee_description: |
  DSToken does not expose product-level management, performance, subscription or redemption fees.
  Fee terms are determined by each issuer's fund documents and are therefore reported as unknown
  by this integration.
