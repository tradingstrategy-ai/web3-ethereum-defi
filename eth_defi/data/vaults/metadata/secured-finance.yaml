name: Secured Finance
slug: secured-finance
short_description: |
  Fixed-rate lending protocol with ERC-4626 lender vaults.
long_description: |
  Secured Finance is a fixed-rate lending protocol whose vault products package lender positions into ERC-4626 vaults. The public vault frontend currently exposes lender vaults such as the JPYC market on Ethereum.

fee_description: |
  Secured Finance documents protocol trading fees for its fixed-rate lending markets rather than explicit vault management or withdrawal fees.

  According to the fixed-rate lending fee documentation:

  - Market takers pay 0.25% for a 3-month duration, scaling linearly to 1.00% annualised
  - Limit orders are fee-free
  - Auto-roll uses the same fee schedule as market taking

  In this repository, these are treated as internalised protocol costs because they are incurred during the vault's underlying lending actions, not as explicit ERC-4626 deposit or redemption fees charged to the end user.
