name: Franklin Templeton
slug: franklin-templeton
short_description: |
  Permissioned tokenised money-market fund shares issued through Franklin Templeton's Benji platform.
long_description: |
  Franklin Templeton's Benji platform provides blockchain-integrated recordkeeping and transfer-agent
  services for tokenised fund shares. This integration covers the issuer-published Ethereum addresses for
  the Franklin OnChain U.S. Government Money Fund (BENJI) and Franklin OnChain Institutional Liquidity
  Fund Ltd. (iBENJI).

  These products are regulated, permissioned fund shares rather than public deposit vaults. Investors must
  satisfy the issuer's eligibility and compliance requirements; subscriptions, redemptions and transfers
  are subject to the fund's servicing and transfer-agent controls. The library reads the share supply and
  issuer-maintained reference price, which should be checked for freshness against current fund materials.
fee_description: |
  The Ethereum share-token contracts do not publish a general fund fee schedule. Fund expenses and any
  subscription or redemption terms are product-specific and governed by the issuer's current fund documents;
  they are not represented as generic on-chain deposit, withdrawal or performance fees in this integration.
