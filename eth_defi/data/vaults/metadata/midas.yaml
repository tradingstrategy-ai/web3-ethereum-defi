name: Midas
slug: midas
short_description: |
  Tokenised real-world asset and yield products that publish their price on-chain.
long_description: |
  Midas offers tokenised investment products that make selected off-chain and on-chain yield strategies
  available as transferable ERC-20 tokens. Products such as mTBILL and mBASIS are designed to track a
  published net asset value, giving holders an on-chain token whose price reflects the value of the
  underlying strategy.

  These products behave differently from standard ERC-4626 vaults. The token itself represents the holder's
  position, while subscriptions, redemptions and price reporting are handled by separate Midas contracts.
  For public vault analytics, Midas products can still be tracked like vaults by reading the token supply
  and the official Midas on-chain price feed over time.
fee_description: |
  Midas NAV/share is published through the Midas oracle pipeline after product-level expenses are accounted
  for. The exact management and performance fee split is product-specific and is not exposed by the mToken
  interface. Instant issuance and redemption fees are exposed by Midas product vault contracts and can be
  read by the adapter.
