name: Circle USYC
slug: usyc
short_description: |
  Permissioned tokenised money market fund offering yield-bearing exposure to short-term U.S. government securities.
long_description: |
  Circle USYC is the on-chain representation of shares in the Hashnote International Short Duration Yield Fund Ltd. The fund invests in U.S. Treasury bills and reverse repurchase agreements backed by short-term U.S. government securities.

  USYC is designed for institutional use and is available only to eligible non-U.S. persons, subject to further onboarding and entitlement checks. It uses USDC for subscriptions and redemptions; the token price changes with the fund's net asset value rather than through staking or token rebases.
fee_description: |
  Circle publishes a standard 0.04% subscription fee and 0.03% redemption fee. Eligible investors receive a zero-fee tier for combined daily subscription and redemption volume up to $1 million, with standard fees applying above that threshold. Circle also publishes a 10% performance fee on yield; these costs affect the fund's net asset value.
