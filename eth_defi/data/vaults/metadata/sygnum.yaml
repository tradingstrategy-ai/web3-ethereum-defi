name: Sygnum
slug: sygnum
short_description: |
  Permissioned tokenised fund shares issued and administered through Sygnum's Desygnate platform.
long_description: |
  Sygnum's Desygnate platform provides the on-chain registry and settlement infrastructure for tokenised investment products. The initial integration tracks the Ethereum FILQ-A share class of Fidelity International's USD Digital Liquidity Fund.

  FILQ shares are available only to eligible, approved investors. Subscription, transfer and redemption are subject to the issuer's onboarding, compliance and settlement processes, so token ownership does not provide an unrestricted public dealing route.
fee_description: |
  The reviewed FILQ token contract does not expose the underlying fund's management, performance, subscription or redemption fees. Fund costs and dealing charges, where applicable, are determined by the product documentation and investor agreement rather than inferred from the ERC-20 share token.
