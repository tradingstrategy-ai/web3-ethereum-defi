name: Peapods
slug: peapods
short_description: |
  DeFi protocol offering yield products and managed vaults for tokenised assets.
long_description: |
  Peapods Finance provides tokenised portfolio products and interest-bearing vaults designed to make yield strategies available for a range of assets. Vault returns depend on the underlying assets, liquidity and strategy execution.

  Depositors can face smart-contract, market, liquidity and strategy risks. Availability and the terms of individual products vary across networks.
fee_description: |
  Fees depend on the specific Peapods product or vault. Review the current product interface and documentation for management, performance, transaction and redemption costs before depositing.
