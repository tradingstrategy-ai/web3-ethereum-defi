name: Bulla Network
slug: bulla
short_description: |
  Permissioned stablecoin liquidity pools for financing trade invoices and loans.
long_description: |
  [Bulla Network](https://www.bulla.network/) provides onchain infrastructure
  for financing real-world invoices and loan offers. Its Bulla Factoring pools
  use ERC-4626 share accounting while financing receivables through Bulla Claim
  and BullaFrendLend contracts.

  Pool access is not necessarily public. Bulla Factoring contracts can apply
  separate deposit, redemption and factoring permission managers, and a
  redemption queue may delay withdrawals when the pool does not have available
  liquidity. Depositors remain exposed to the creditworthiness and collection
  of financed receivables, as well as smart-contract, administrator and
  underwriter risks.

  The public [factoring-contracts repository](https://github.com/bulla-network/factoring-contracts)
  contains the BullaFactoring contracts and published audit reports. Audit
  coverage does not remove pool-specific credit, liquidity or permission risk.
fee_description: |
  Bulla Factoring pools can configure protocol, administrator and underwriting
  fees around financing operations. These charges do not map safely to a
  protocol-wide ERC-4626 management or performance fee, and can differ by pool
  and financing arrangement. Review the selected pool's onchain configuration
  and financing terms before depositing.
