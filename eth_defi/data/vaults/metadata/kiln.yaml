name: Kiln
slug: kiln
short_description: |
  DeFi yield vaults that give partners a simple way to offer curated earning opportunities.
long_description: |
  Kiln OmniVaults helps wallets, custodians and other partners offer selected DeFi yield products
  to their customers. Each vault gives users access to a chosen earning strategy for a specific
  asset and network. The current Kiln product name is OmniVaults; it replaces the older Kiln DeFi
  and Metavault terminology used by some historical vault records.

  Deposits and redemptions are designed to be completed directly, without a Kiln waiting period.
  Availability can still depend on market liquidity and the status of the selected strategy.

  Kiln provides the vault technology, while each partner chooses its supported strategies and
  customer fees. Returns come from established DeFi platforms such as Aave, Compound, Morpho,
  Spark, Venus, Angle, Fluid, Frax, ZeroLend, Kinetic and Sky.

  Key features:

  - Curated DeFi earning opportunities from trusted partners
  - Support for multiple assets, networks and strategies
  - Direct deposits and redemptions, subject to available liquidity
  - Independent security reviews and public bug-bounty programmes
fee_description: |
  Fees are set separately for each vault by the partner offering it. A vault may charge a fixed fee
  when users deposit and a percentage of rewards generated. The underlying DeFi strategy may also
  have its own fees or costs.
