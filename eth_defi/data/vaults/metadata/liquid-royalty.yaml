name: Liquid Royalty
slug: liquid-royalty
short_description: |
  Tiered vault protocol on Berachain with profit spillover and cascading backstop mechanisms.
long_description: |
  Liquid Royalty is a vault protocol on Berachain implementing a tiered vault architecture
  with profit spillover and cascading backstop mechanisms.

  The protocol features several vault types:

  - Senior vault: primary yield-generating vault
  - Junior vault: receives 80% of Senior's excess profits (spillover) and provides secondary backstop
  - ALAR SailOut Royalty vault: uses USDe as the underlying asset

  All vaults are non-rebasing ERC-4626 compliant.
fee_description: |
  No management or performance fees.
  7-day cooldown period for penalty-free withdrawals.
  20% liquidation penalty for early withdrawals within cooldown.
  1% base withdrawal fee on Junior vault.
