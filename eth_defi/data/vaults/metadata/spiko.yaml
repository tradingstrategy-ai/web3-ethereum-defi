name: Spiko
slug: spiko
short_description: |
  Permissioned tokenised money-market fund shares with issuer-published NAV.
long_description: |
  Spiko offers tokenised shares in regulated money-market funds, including the U.S. Treasury-bill
  fund represented by USTBL. The fund is designed for cash management and its share value is published
  each business day by the fund administrator.

  USTBL is subject to investor eligibility and transfer controls. Subscription and redemption requests
  are handled through Spiko's servicing process rather than as public, immediate token transactions;
  holders should consult Spiko's official fund documentation for dealing terms and applicable constraints.
fee_description: |
  Spiko states that USTBL carries a 0.25% annual management fee, reflected in its published NAV/share.
  The public token contract does not publish a universal subscription or redemption fee, and investor
  dealing follows Spiko's eligibility-checked servicing process.
