name: Ondo
slug: ondo
short_description: |
  Tokenised U.S. dollar yield and short-term government-securities products for eligible investors.
long_description: |
  Ondo issues tokenised products that give eligible investors access to U.S. dollar yield and
  short-term U.S. government-securities strategies. This integration covers the Ethereum USDY
  and OUSG share tokens, whose issuers publish their redemption value through on-chain price oracles.

  These products have investor eligibility, onboarding and transfer restrictions. USDY and OUSG
  are not general-purpose public deposit accounts: subscriptions and redemptions use Ondo's
  issuer-managed process, and the availability of those processes depends on the investor and product terms.
fee_description: |
  Fund expenses affect the published NAV or redemption price. OUSG documents a 0.15% management
  fee, waived until 1 January 2027. USDY and OUSG issuer terms, including any subscription or
  redemption costs, should be checked with Ondo before investing because the token contracts do
  not provide a complete public product-fee schedule.
