name: 40acres
slug: forty_acres
short_description: |
  Cashflow lending protocol for veNFT collateral with ERC-4626 USDC supply vaults
long_description: |
  40acres is a cashflow lending protocol for revenue-generating on-chain assets, primarily
  vote-escrowed NFTs (veNFTs) from DEXes like Aerodrome, Velodrome, Pharaoh, and Blackhole.
  Users deposit their veNFTs as collateral and receive instant USDC loans calculated against
  the assets' expected future rewards.

  On the lending side, 40acres operates a peer-to-pool model with ERC-4626-compliant USDC
  supply vaults where anyone can deposit USDC to earn organic yield sourced from real DEX
  trading fees and bribes.
fee_description: |
  Fees are embedded in the protocol mechanics: 20% of weekly veNFT rewards go to lenders,
  5% to the protocol treasury, 0.8% origination fee on new loans, and 1% relayer fee on rewards.
