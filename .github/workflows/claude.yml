name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine model from comment
        id: model_select
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || github.event.issue.title }}
        run: |
          # Allow callers to select model by including a keyword in their @claude message:
          #   @claude opus ...   → claude-opus-4-6   (most capable, slower)
          #   @claude haiku ...  → claude-haiku-4-5-20251001  (fastest, cheapest)
          #   @claude ...        → claude-sonnet-4-6 (default, balanced)
          if echo "$COMMENT_BODY" | grep -qi '\bopus\b'; then
            echo "model=claude-opus-4-6" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -qi '\bhaiku\b'; then
            echo "model=claude-haiku-4-5-20251001" >> $GITHUB_OUTPUT
          else
            echo "model=claude-sonnet-4-6" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: ${{ steps.model_select.outputs.model }}
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh search:*)"'
