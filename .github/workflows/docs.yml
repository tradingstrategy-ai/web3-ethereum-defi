name: Build documentation

# Docs are rebuilt on a fixed schedule (Mon/Wed/Sat) rather than on every merge
# to master. "Build documentation" is non-blocking for merges, and docs rarely
# need rebuilding per commit. Use workflow_dispatch (from master) to publish a
# doc fix immediately without waiting for the next slot.
on:
  schedule:
    # 06:17 UTC on Mon (1), Wed (3), Sat (6). Non-zero minute on purpose:
    # top-of-hour cron is a GitHub high-load window where runs may be delayed
    # or dropped.
    - cron: "17 6 * * 1,3,6"
  workflow_dispatch: {}

jobs:
  build-docs:
    runs-on:
      group: Beefy runners
    timeout-minutes: 30

    # Only run the action for the latest push
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    # contents: write is needed to upload the pre-built docs zip as a
    # rolling "docs-latest" GitHub Release asset (consumed by Read the Docs).
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # Poetry must be installed before setup-python for cache to work
      # https://github.com/python-poetry/poetry/blob/main/CHANGELOG.md
      - name: Install poetry
        run: pipx install "poetry>=2.3"

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "poetry"
          # Key the built-in Poetry cache on the lockfile so it invalidates on a
          # locked-dependency change and hits when only source changes.
          cache-dependency-path: |
            poetry.lock
            **/pyproject.toml

      # The virtualenv is cached by actions/setup-python (cache: "poetry", keyed
      # on poetry.lock above), so no separate venv-cache step is needed.

      # Required by nbsphinx for notebook conversion
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # Install dependencies with the specific Web3.py version
      # Using a single installation command to avoid conflicts
      - name: Install dependencies
        run: |
          poetry install -E docs -E data -E test -E hypersync -E ccxt -E duckdb -E posts

      - name: Build documentation
        run: |
          poetry run make build-docs

      # Zip the *contents* of docs/build/html so files land at the zip root
      # (index.html, not html/index.html). Read the Docs unzips this straight
      # into $READTHEDOCS_OUTPUT/html.
      - name: Zip built HTML
        run: (cd docs/build/html && zip -r -q "$GITHUB_WORKSPACE/docs-html.zip" .)

      # Publish the zip as a rolling "docs-latest" release asset so RTD can
      # download it over a stable public URL. --clobber overwrites the asset
      # on every master build.
      # Publishing steps have production side effects (they clobber the shared
      # docs-latest release asset, deploy Cloudflare Pages and trigger RTD), so
      # they are guarded to master. A manual workflow_dispatch on a feature
      # branch therefore builds and validates docs without replacing the live
      # site. Preview-branch publication is intentionally disabled.
      - name: Upload docs zip to GitHub Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view docs-latest >/dev/null 2>&1 \
            || gh release create docs-latest --prerelease --title "Latest docs build" --notes "Rolling pre-built Sphinx HTML for Read the Docs."
          gh release upload docs-latest docs-html.zip --clobber

      - name: Install wrangler
        if: github.ref == 'refs/heads/master'
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/master'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: make deploy-docs-cloudflare-only

      # Kick Read the Docs to rebuild now that the fresh docs-latest asset is
      # uploaded. RTD's build.commands just download that zip — no Sphinx run.
      # https://docs.readthedocs.io/en/stable/api/v3.html#build-triggering
      - name: Trigger Read the Docs build
        if: github.ref == 'refs/heads/master'
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            https://readthedocs.org/api/v3/projects/web3-ethereum-defi/versions/latest/builds/
