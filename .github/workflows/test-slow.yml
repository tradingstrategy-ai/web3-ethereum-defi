name: Slow integration tests

# Tests marked @pytest.mark.slow — long block scans, live API pipelines.
# Runs on free ubuntu-latest in parallel with the main test suite so they
# don't add wall-clock to the Beefy job.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test-slow:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.event.pull_request.draft == false || github.event_name == 'push'

    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    name: Slow tests - Python ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install poetry (using matrix Python)
        run: pipx install "poetry>=2.3" --python "${{ env.PYTHON_PATH }}"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          # Key the built-in Poetry cache on the lockfile so it invalidates on a
          # locked-dependency change and hits when only source changes.
          cache-dependency-path: |
            poetry.lock
            **/pyproject.toml

      # The virtualenv is cached by actions/setup-python (cache: "poetry", keyed
      # on poetry.lock above), so no separate venv-cache step is needed.
      - name: Install dependencies
        run: |
          poetry install
          poetry install -E data -E test -E hypersync -E ccxt -E duckdb -E posts

      - name: Run slow tests
        run: |
          poetry run pytest --timeout-method=thread --tb=native -v -s --capture=no --ignore=tests/gmx -m slow
        env:
          JSON_RPC_ETHEREUM: ${{ secrets.JSON_RPC_ETHEREUM }}
          JSON_RPC_BASE: ${{ secrets.JSON_RPC_BASE }}
          JSON_RPC_ARBITRUM: ${{ secrets.JSON_RPC_ARBITRUM }}
          JSON_RPC_BINANCE: ${{ secrets.JSON_RPC_BINANCE }}
          JSON_RPC_POLYGON: ${{ secrets.JSON_RPC_POLYGON }}
          HYPERSYNC_API_KEY: ${{ secrets.HYPERSYNC_API_KEY }}
          TOKEN_RISK_API_KEY: ${{ secrets.TOKEN_RISK_API_KEY }}
